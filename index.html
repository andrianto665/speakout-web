<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakOut - Ngomong Inggris Jadi Mudah</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f7f7f7;
            overflow-x:hidden;
        }

        a{
            text-decoration:none;
        }

        /* ================= HEADER ================= */

        .header{
            width:100%;
            background:white;
            padding:18px 0;
            position:sticky;
            top:0;
            z-index:999;
            box-shadow:0 2px 15px rgba(0,0,0,0.04);
        }

        .header-container{
            max-width:1200px;
            margin:auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-icon{
            width:45px;
            height:45px;
            border-radius:12px;
            background:linear-gradient(135deg,#ff8a00,#ff0058);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:22px;
            font-weight:700;
        }

        .logo-text h1{
            font-size:24px;
            color:#2b2b72;
            line-height:1;
        }

        .logo-text p{
            font-size:12px;
            color:#666;
        }

        .nav-menu{
            display:flex;
            gap:35px;
            list-style:none;
        }

        .nav-menu a{
            color:#222;
            font-weight:500;
            transition:0.3s;
        }

        .nav-menu a:hover{
            color:#5b4bff;
        }

        .btn-login{
            background:#1e73be;
            color:white;
            padding:14px 34px;
            border-radius:4px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#125e9f;
        }

        /* ================= HERO ================= */

        .hero{
            width:100%;
            min-height:88vh;
            display:flex;
            align-items:center;
            position:relative;
            overflow:hidden;
        }

        .hero::before{
            content:"Speak";
            position:absolute;
            left:-40px;
            top:50px;
            font-size:260px;
            font-weight:800;
            color:rgba(0,0,0,0.03);
            z-index:0;
        }

        .hero-container{
            max-width:1200px;
            margin:auto;
            padding:0 20px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
            align-items:center;
            position:relative;
            z-index:2;
        }

        .hero-text h1{
            font-size:76px;
            line-height:1.08;
            color:#252b72;
            margin-bottom:25px;
            font-weight:800;
        }

        .hero-text p{
            font-size:22px;
            color:#333;
            line-height:1.7;
            margin-bottom:40px;
            max-width:650px;
        }

        .btn-register{
            display:inline-block;
            background:linear-gradient(135deg,#e000ff,#7b00ff);
            color:white;
            padding:22px 55px;
            border-radius:60px;
            font-size:28px;
            font-weight:600;
            transition:0.3s;
            box-shadow:0 10px 30px rgba(191,0,255,0.25);
        }

        .btn-register:hover{
            transform:translateY(-3px);
        }

        /* ================= HERO IMAGE ================= */

        .hero-image{
            position:relative;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .blue-card{
            width:480px;
            height:600px;
            background:#2f7ac9;
            transform:rotate(7deg);
            border-radius:8px;
            position:absolute;
        }

        .photo-frame{
            width:520px;
            background:#f3f3f3;
            padding:18px 18px 110px;
            border-radius:8px;
            transform:rotate(6deg);
            position:relative;
            box-shadow:0 15px 40px rgba(0,0,0,0.12);
        }

        .photo-frame img{
            width:100%;
            border-radius:5px;
            display:block;
        }

        .speakout-logo{
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            font-size:68px;
            font-weight:800;
            color:#b00086;
        }

        .bubble{
            position:absolute;
            border-radius:50%;
            background:#48c7ff;
        }

        .bubble1{
            width:120px;
            height:120px;
            top:40px;
            left:-20px;
        }

        .bubble2{
            width:24px;
            height:24px;
            bottom:80px;
            left:40px;
            background:#f0b9ff;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:992px){

            .hero-container{
                grid-template-columns:1fr;
                text-align:center;
            }

            .hero-text h1{
                font-size:52px;
            }

            .hero-text p{
                margin:auto auto 35px;
                font-size:18px;
            }

            .photo-frame{
                width:100%;
                max-width:420px;
            }

            .blue-card{
                width:390px;
                height:520px;
            }

            .nav-menu{
                display:none;
            }
        }

        @media(max-width:600px){

            .hero-text h1{
                font-size:42px;
            }

            .btn-register{
                font-size:22px;
                padding:18px 40px;
            }

            .speakout-logo{
                font-size:50px;
            }

            .header-container{
                gap:10px;
            }

            .btn-login{
                padding:12px 22px;
            }
        }

    </style>
</head>
<body>

    <!-- ================= HEADER ================= -->

    <header class="header">
        <div class="header-container">

            <div class="logo">
                <div class="logo-icon">S</div>

                <div class="logo-text">
                    <h1>SpeakOut</h1>
                    <p>Ngomong Inggris Jadi Mudah</p>
                </div>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="courses.html">Course</a></li>
                    <li><a href="teachers.html">Teachers</a></li>
                </ul>
            </nav>

            <!-- ✅ LOGIN REDIRECT -->
            <a href="login.html" class="btn-login">Login</a>

        </div>
    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="hero-container">

            <!-- LEFT -->
            <div class="hero-text">

                <h1>
                    Ngomong Inggris<br>
                    Jadi Mudah Dijamin<br>
                    Pasti Bisa!
                </h1>

                <p>
                    Kursus Bahasa Inggris SpeakOut program
                    untuk meningkatkan skill berbicara
                    bahasa Inggris Kamu dengan
                    pembelajaran yang aktif dan praktis.
                </p>

                <a href="register.html" class="btn-register">
                    Daftar Sekarang
                </a>

            </div>

            <!-- RIGHT -->
            <div class="hero-image">

                <div class="bubble bubble1"></div>
                <div class="bubble bubble2"></div>

                <div class="blue-card"></div>

                <div class="photo-frame">

                    <!-- GANTI FOTO SESUAI FILE -->
                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop" alt="Students">

                    <div class="speakout-logo">
                        SpeakOut
                    </div>

                </div>

            </div>

        </div>

    </section>

</body>
</html>
