<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - SpeakOut</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --error: #ef4444;
            
            /* ✅ NEW: SpeakOut Duolingo-style colors */
            --spk-primary: #7B2D8E;
            --spk-primary-light: #9B4DCA;
            --spk-primary-dark: #5A1D6B;
            --spk-primary-bg: #F3E5F5;
            --spk-accent: #FF6B35;
            --spk-accent-light: #FFB088;
            --spk-border: #e5e5e5;
            --spk-gray: #afafaf;
            --spk-text: #3c3c3c;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }
        a { text-decoration: none; }

        /* ===== HEADER - MINIMALIST ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(10,15,35,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--blue-accent); }
        
        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-menu { display: flex; gap: 36px; list-style: none; }
        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-menu a:hover, .nav-menu .active { color: var(--white); }
        
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-name { 
            font-size: 14px; 
            color: var(--gray);
            font-weight: 500;
        }
        .btn-logout {
            background: transparent;
            color: var(--gray);
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        /* ===== PROFESSIONAL HERO ===== */
        .course-hero {
            width: 100%;
            padding: 120px 40px 60px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .course-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
        }
        
        .course-hero-content {
            max-width: 1200px;
            margin: auto;
            position: relative;
            z-index: 2;
        }
        
        .course-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        
        .course-hero p {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 24px;
            max-width: 600px;
        }
        
        .course-meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 13px;
            color: white;
            font-weight: 500;
        }
        .meta-tag.category { background: rgba(166,124,218,0.2); border-color: var(--purple-accent); }
        .meta-tag.level { background: rgba(74,144,217,0.2); border-color: var(--blue-accent); }
        .meta-tag.duration { background: rgba(245,158,11,0.2); border-color: var(--warning); }
        
        .course-progress-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .progress-info { min-width: 120px; }
        .progress-label { font-size: 13px; color: var(--gray); margin-bottom: 4px; }
        .progress-value { font-size: 18px; font-weight: 700; color: var(--purple-accent); }
        
        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--blue));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* ===== LAYOUT ===== */
        .course-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            min-height: 60vh;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(91,45,142,0.1);
        }
        
        .sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--dark);
            font-weight: 700;
        }
        
        .meeting-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .meeting-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: #555;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
        }
        
        .meeting-item:hover { 
            background: rgba(91,45,142,0.08); 
            color: var(--purple);
            transform: translateX(4px);
        }
        
        .meeting-item.active {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(91,45,142,0.3);
        }
        
        .meeting-icon { font-size: 18px; }

        /* Content Area */
        .content-area {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
        }
        
        .content-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--dark);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .content-header span {
            color: var(--purple);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ============================================ */
        /* 🔥 DUOLINGO-STYLE QUIZ UI (NEW!) */
        /* ============================================ */
        
        .duolingo-quiz {
            font-family: 'Nunito', sans-serif;
            background: var(--white);
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }
        
        /* Duolingo Top Bar */
        .duo-top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            margin-bottom: 24px;
        }
        
        .duo-close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--spk-gray);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        
        .duo-close-btn:hover { color: var(--spk-primary); }
        
        .duo-progress-container {
            flex: 1;
            height: 16px;
            background: var(--spk-border);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .duo-progress-fill {
            height: 100%;
            background: var(--spk-primary);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        
        .duo-hearts {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            font-weight: 800;
            color: #ff4b4b;
        }
        
        .duo-heart-icon { font-size: 28px; }
        
        /* Duolingo Category Badge */
        .duo-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--spk-primary-light);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .duo-category-icon {
            width: 28px;
            height: 28px;
            background: var(--spk-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        /* Duolingo Question Title */
        .duo-question-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--spk-text);
            margin-bottom: 40px;
            line-height: 1.3;
        }
        
        /* === TIPE 1: IMAGE-BASED === */
        .duo-options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .duo-option-card {
            background: var(--white);
            border: 2px solid var(--spk-border);
            border-radius: 16px;
            padding: 24px 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .duo-option-card:hover {
            background: #f7f7f7;
            border-color: #d0d0d0;
            transform: translateY(-2px);
        }
        
        .duo-option-card.selected {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary-light);
            border-width: 3px;
        }
        
        .duo-option-card.correct {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary);
            border-width: 3px;
        }
        
        .duo-option-card.wrong {
            background: #FFF0E8;
            border-color: var(--spk-accent);
            border-width: 3px;
        }
        
        .duo-emoji { font-size: 80px; line-height: 1; }
        .duo-label { font-size: 18px; font-weight: 700; color: var(--spk-text); }
        
        .duo-option-number {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: 2px solid var(--spk-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--spk-gray);
        }
        
        /* === TIPE 2: TRANSLATION === */
        .duo-character-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: #f7f7f7;
            border-radius: 20px;
        }
        
        .duo-character-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--spk-primary) 0%, var(--spk-primary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
        }
        
        .duo-speech-bubble {
            background: var(--white);
            padding: 20px 28px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 700;
            color: var(--spk-text);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .duo-speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 12px solid var(--white);
        }
        
        .duo-translation-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .duo-translation-option {
            background: var(--white);
            border: 2px solid var(--spk-border);
            border-radius: 16px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .duo-translation-option:hover {
            background: #f7f7f7;
            border-color: #d0d0d0;
            transform: translateX(4px);
        }
        
        .duo-translation-option.selected {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary-light);
            border-width: 3px;
        }
        
        .duo-translation-option.correct {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary);
            border-width: 3px;
        }
        
        .duo-translation-option.wrong {
            background: #FFF0E8;
            border-color: var(--spk-accent);
            border-width: 3px;
        }
        
        .duo-option-number-small {
            width: 32px;
            height: 32px;
            border: 2px solid var(--spk-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--spk-gray);
            flex-shrink: 0;
        }
        
        .duo-option-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--spk-text);
            flex: 1;
        }
        
        /* === TIPE 3: FILL IN THE BLANK === */
        .duo-audio-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: #f7f7f7;
            border-radius: 20px;
        }
        
        .duo-character-bear {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            flex-shrink: 0;
        }
        
        .duo-audio-bubble {
            background: var(--white);
            padding: 20px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .duo-audio-btn {
            width: 48px;
            height: 48px;
            background: var(--spk-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .duo-audio-btn:hover {
            background: var(--spk-primary-light);
            transform: scale(1.1);
        }
        
        .duo-audio-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--spk-text);
        }
        
        .duo-sentence-container { margin-bottom: 40px; }
        
        .duo-sentence {
            font-size: 28px;
            font-weight: 700;
            color: var(--spk-text);
            line-height: 2;
        }
        
        .duo-blank {
            display: inline-block;
            min-width: 150px;
            border-bottom: 3px solid var(--spk-primary);
            padding: 0 12px;
            color: var(--spk-primary);
        }
        
        .duo-blank.correct { color: var(--spk-primary); border-color: var(--spk-primary); }
        .duo-blank.wrong { color: var(--spk-accent); border-color: var(--spk-accent); }
        
        .duo-word-bank {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .duo-word-chip {
            background: var(--white);
            border: 2px solid var(--spk-border);
            border-radius: 12px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: 700;
            color: var(--spk-text);
        }
        
        .duo-word-chip:hover {
            background: #f7f7f7;
            border-color: #d0d0d0;
            transform: translateY(-2px);
        }
        
        .duo-word-chip.selected {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary-light);
            color: var(--spk-primary);
        }
        
        .duo-word-chip.used {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* === TIPE 0: TEXT (Legacy - 4 opsi A/B/C/D) === */
        .duo-text-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .duo-text-option {
            background: var(--white);
            border: 2px solid var(--spk-border);
            border-radius: 16px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .duo-text-option:hover {
            background: #f7f7f7;
            border-color: #d0d0d0;
            transform: translateX(4px);
        }
        
        .duo-text-option.selected {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary-light);
            border-width: 3px;
        }
        
        .duo-text-option.correct {
            background: var(--spk-primary-bg);
            border-color: var(--spk-primary);
            border-width: 3px;
        }
        
        .duo-text-option.wrong {
            background: #FFF0E8;
            border-color: var(--spk-accent);
            border-width: 3px;
        }
        
        .duo-text-letter {
            width: 36px;
            height: 36px;
            background: var(--spk-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: var(--spk-gray);
            flex-shrink: 0;
        }
        
        .duo-text-option.selected .duo-text-letter {
            background: var(--spk-primary);
            color: white;
        }
        
        .duo-text-option.correct .duo-text-letter {
            background: var(--spk-primary);
            color: white;
        }
        
        .duo-text-option.wrong .duo-text-letter {
            background: var(--spk-accent);
            color: white;
        }
        
        .duo-text-content {
            font-size: 17px;
            font-weight: 600;
            color: var(--spk-text);
            flex: 1;
        }
        
        /* === DUOLINGO FOOTER === */
        .duo-footer {
            position: sticky;
            bottom: 0;
            background: var(--white);
            border-top: 2px solid var(--spk-border);
            padding: 20px 0;
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .duo-btn-skip {
            background: var(--white);
            border: 2px solid var(--spk-border);
            border-radius: 16px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 800;
            color: var(--spk-gray);
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        
        .duo-btn-skip:hover {
            background: #f7f7f7;
            color: var(--spk-text);
            border-color: var(--spk-primary-light);
        }
        
        .duo-btn-check {
            background: var(--spk-border);
            border: none;
            border-radius: 16px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 800;
            color: var(--spk-gray);
            cursor: not-allowed;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        
        .duo-btn-check.active {
            background: var(--spk-primary);
            color: var(--white);
            cursor: pointer;
            box-shadow: 0 4px 0 var(--spk-primary-dark);
        }
        
        .duo-btn-check.active:hover { background: var(--spk-primary-light); }
        
        .duo-btn-check.active:active {

    <!-- ✅ NOTIFICATION & TIMER SCRIPTS -->
    <script>
    /**
     * 🔔 NOTIFICATION TOAST
     */
    function showNotification(message, type = 'success') {
        const existingNotification = document.querySelector('.notification');
        if (existingNotification) {
            existingNotification.remove();
        }

        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        
        const icons = { success: '✅', error: '❌', warning: '⚠️' };
        const titles = { success: 'Berhasil!', error: 'Gagal!', warning: 'Perhatian!' };

        notification.innerHTML = `
            <span class="notification-icon">${icons[type]}</span>
            <div class="notification-content">
                <div class="notification-title">${titles[type]}</div>
                <div class="notification-message">${message}</div>
            </div>
        `;

        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.animation = 'slideOutRight 0.4s ease forwards';
            setTimeout(() => {
                notification.remove();
            }, 400);
        }, 4000);
    }

    /**
     * 📊 RENDER COURSE META INFO
     */
    function renderCourseMeta(courseData) {
        const metaContainer = document.getElementById('courseMetaHero');
        const metaCategory = document.getElementById('metaCategory');
        const metaLevel = document.getElementById('metaLevel');
        const metaDuration = document.getElementById('metaDuration');
        
        if (!metaContainer || !courseData) return;
        
        let hasMeta = false;
        
        if (courseData.category) {
            metaCategory.textContent = `📚 ${courseData.category}`;
            metaCategory.style.display = 'inline-flex';
            hasMeta = true;
        } else if (metaCategory) {
            metaCategory.style.display = 'none';
        }
        
        if (courseData.level) {
            metaLevel.textContent = `🎓 ${courseData.level}`;
            metaLevel.style.display = 'inline-flex';
            hasMeta = true;
        } else if (metaLevel) {
            metaLevel.style.display = 'none';
        }
        
        if (courseData.duration) {
            metaDuration.textContent = `⏱️ ${courseData.duration}`;
            metaDuration.style.display = 'inline-flex';
            hasMeta = true;
        } else if (metaDuration) {
            metaDuration.style.display = 'none';
        }
        
        if (hasMeta) {
            metaContainer.style.display = 'flex';
        }
    }

    /**
     * 📥 DOWNLOAD CERTIFICATE
     */
    async function downloadCertificate(courseId) {
        const token = localStorage.getItem('speakout_token');
        if (!token) {
            showNotification('Silakan login terlebih dahulu', 'error');
            window.location.href = 'login.html';
            return;
        }
        
        try {
            showNotification('Mempersiapkan certificate...', 'warning');
            
            const response = await fetch(`http://127.0.0.1:8000/api/user/certificates/${courseId}/download`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!response.ok) {
                if (response.status === 404) {
                    showNotification('Certificate belum tersedia. Selesaikan semua lesson terlebih dahulu!', 'error');
                    return;
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SpeakOut-Certificate-${courseId}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
            
            showNotification('🎉 Certificate berhasil didownload!', 'success');
            
        } catch (error) {
            console.error('Download certificate error:', error);
            showNotification('Gagal mendownload certificate. Silakan coba lagi.', 'error');
        }
    }

    /**
     * ⏱️ QUIZ TIMER LOGIC
     */
    let timerInterval = null;
    let remainingSeconds = 0;

    function startQuizTimer(timeLimitMinutes) {
        if (timerInterval) clearInterval(timerInterval);

        remainingSeconds = (timeLimitMinutes && timeLimitMinutes > 0) 
            ? timeLimitMinutes * 60 
            : 60 * 60;
        
        const timerBox = document.getElementById('quiz-timer-box');
        if (timerBox) timerBox.style.display = 'block';

        timerInterval = setInterval(() => {
            remainingSeconds--;
            
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            const display = document.getElementById('timer-display');
            
            if (display) {
                display.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                if (remainingSeconds <= 300) {
                    display.style.color = '#dc2626';
                    const timerBox = document.getElementById('quiz-timer-box');
                    if (timerBox) timerBox.style.borderLeftColor = '#dc2626';
                }
            }

            if (remainingSeconds <= 0) {
                clearInterval(timerInterval);
                showNotification('⏰ Waktu quiz telah habis! Jawaban akan disubmit otomatis.', 'warning');
                
                if (typeof currentQuizId !== 'undefined' && currentQuizId) {
                    if (typeof submitQuizAnswers === 'function') {
                        submitQuizAnswers(currentQuizId);
                    }
                }
            }
        }, 1000);
    }

    function stopQuizTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const timerBox = document.getElementById('quiz-timer-box');
        if (timerBox) timerBox.style.display = 'none';
    }

    window.addEventListener('beforeunload', () => {
        if (timerInterval) clearInterval(timerInterval);
    });

    /**
     * 🎉 CELEBRATION OVERLAY
     */
    function showCourseCompletedCelebration(courseId) {
        const existing = document.querySelector('.celebration-overlay');
        if (existing) existing.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'celebration-overlay';
        overlay.innerHTML = `
            <div class="emoji">🎉</div>
            <h2>Course Completed!</h2>
            <p>Selamat! Kamu telah menyelesaikan course ini.</p>
            <p style="color: var(--warning); margin: 20px 0;">
            ⏳ Certificate sedang menunggu persetujuan admin.<br>
            Kamu akan mendapat notifikasi saat certificate disetujui.
            </p>
            <div class="btn-group">
                <button class="btn btn-certificate" onclick="window.location.href='dashboard.html'">
                    🏠 View Dashboard
                </button>
                <button class="btn btn-secondary" onclick="this.closest('.celebration-overlay').remove()">
                    ✕ Keep Learning
                </button>
            </div>
        `;
        document.body.appendChild(overlay);
        createConfetti(overlay);
        showNotification('🎉 Selamat! Kamu telah menyelesaikan course!', 'success');
    }

    function createConfetti(container) {
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#a67cda', '#ef4444'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.cssText = `background:${colors[i%colors.length]};left:${Math.random()*100}%;top:-10px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*0.5}s;`;
            container.appendChild(confetti);
        }
    }

    /**
     * 🔄 PATCH: Integrate with course-details.js
     */
    document.addEventListener('DOMContentLoaded', function() {
        const user = api.getUser();
        if (user?.name) {
            const userName = user.name.split(' ')[0];
            document.getElementById('userName').textContent = userName;
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
                clearAllUserProgress();
                api.logout();
            }
        });
        
        const checkCourseData = setInterval(() => {
            if (typeof courseData !== 'undefined' && courseData) {
                renderCourseMeta(courseData);
                clearInterval(checkCourseData);
            }
        }, 100);
        
        setTimeout(() => clearInterval(checkCourseData), 5000);
    });

    /**
     * 🔄 Override toggleLessonComplete for notifications
     */
    const originalToggleLessonComplete = window.toggleLessonComplete;
    window.toggleLessonComplete = async function(courseId, meetingId, isCompleted) {
        try {
            await originalToggleLessonComplete(courseId, meetingId, isCompleted);
            showNotification(
                isCompleted ? 'Progress berhasil disimpan!' : 'Progress diupdate',
                'success'
            );
        } catch (error) {
            showNotification('Gagal mengupdate progress', 'error');
        }
    };
    </script>

</body>
</html>
