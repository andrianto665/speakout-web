<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - SpeakOut</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }
        a { text-decoration: none; }

        /* ===== HEADER - MINIMALIST (Like Dashboard) ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(10,15,35,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--blue-accent); }
        
        /* ✅ Minimalist Navigation - Only Dashboard */
        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-menu { display: flex; gap: 36px; list-style: none; }
        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-menu a:hover, .nav-menu .active { color: var(--white); }
        
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-name { 
            font-size: 14px; 
            color: var(--gray);
            font-weight: 500;
        }
        .btn-logout {
            background: transparent;
            color: var(--gray);
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        /* ===== PROFESSIONAL HERO ===== */
        .course-hero {
            width: 100%;
            padding: 120px 40px 60px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .course-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
        }
        
        .course-hero-content {
            max-width: 1200px;
            margin: auto;
            position: relative;
            z-index: 2;
        }
        
        .course-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        
        .course-hero p {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 24px;
            max-width: 600px;
        }
        
        .course-meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 13px;
            color: white;
            font-weight: 500;
        }
        .meta-tag.category { background: rgba(166,124,218,0.2); border-color: var(--purple-accent); }
        .meta-tag.level { background: rgba(74,144,217,0.2); border-color: var(--blue-accent); }
        .meta-tag.duration { background: rgba(245,158,11,0.2); border-color: var(--warning); }
        
        .course-progress-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .progress-info {
            min-width: 120px;
        }
        
        .progress-label {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 4px;
        }
        
        .progress-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--purple-accent);
        }
        
        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--blue));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* ===== LAYOUT ===== */
        .course-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            min-height: 60vh;
        }

        /* Sidebar - Modern Card Design */
        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(91,45,142,0.1);
        }
        
        .sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--dark);
            font-weight: 700;
        }
        
        .meeting-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .meeting-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: #555;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
        }
        
        .meeting-item:hover { 
            background: rgba(91,45,142,0.08); 
            color: var(--purple);
            transform: translateX(4px);
        }
        
        .meeting-item.active {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(91,45,142,0.3);
        }
        
        .meeting-icon {
            font-size: 18px;
        }

        /* Content Area - Professional Design */
        .content-area {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
        }
        
        .content-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--dark);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .content-header span {
            color: var(--purple);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Lesson List - Modern */
        .lesson-list { 
            list-style: none; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .lesson-item {
            padding: 20px;
            background: var(--surface2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .lesson-item:hover {
            background: white;
            border-color: rgba(91,45,142,0.2);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(91,45,142,0.1);
        }
        
        .lesson-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .lesson-content {
            flex: 1;
        }
        
        .lesson-title {
            color: var(--dark);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .lesson-type {
            font-size: 13px;
            color: var(--gray);
        }
        
        .lesson-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .lesson-complete {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .lesson-complete input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }
        
        .lesson-complete label {
            font-size: 13px;
            color: var(--gray);
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        
        .lesson-complete input:checked + label {
            color: var(--success);
            font-weight: 600;
        }

        /* 🔥 QUIZ UI - Professional Design */
        .quiz-container {
            background: var(--surface2);
            border-radius: 16px;
            padding: 32px;
            margin-top: 20px;
        }
        
        .quiz-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0f0;
        }
        
        .quiz-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 12px;
        }
        
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0f0;
        }
        
        .quiz-progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            min-width: 100px;
        }
        
        .quiz-progress-bar {
            flex: 1;
            height: 8px;
            background: #e0e0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--blue));
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .quiz-question {
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 2px solid #e0e0f0;
        }
        
        .quiz-question:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .quiz-question-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-question-number {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .quiz-question-text {
            font-weight: 600;
            font-size: 17px;
            color: var(--dark);
            line-height: 1.5;
            flex: 1;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 44px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: white;
            border: 2px solid #e0e0f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:hover {
            border-color: var(--purple-light);
            background: rgba(91,45,142,0.05);
            transform: translateX(4px);
        }
        
        .quiz-option.selected {
            border-color: var(--purple);
            background: rgba(91,45,142,0.1);
            box-shadow: 0 2px 8px rgba(91,45,142,0.2);
        }
        
        .quiz-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--purple);
            cursor: pointer;
        }
        
        .quiz-option label {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        
        .quiz-submit-btn {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 28px;
            box-shadow: 0 4px 16px rgba(91,45,142,0.3);
        }
        
        .quiz-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91,45,142,0.4);
        }
        
        .quiz-submit-btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .quiz-result {
            margin-top: 32px;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
        }
        
        .quiz-result.passed {
            background: var(--success-light);
            border: 2px solid var(--success);
            color: #065f46;
        }
        
        .quiz-result.failed {
            background: #fef2f2;
            border: 2px solid var(--error);
            color: #991b1b;
        }
        
        .quiz-result-score {
            font-size: 56px;
            font-weight: 900;
            margin: 16px 0;
        }
        
        .quiz-result.passed .quiz-result-score { color: var(--success); }
        .quiz-result.failed .quiz-result-score { color: var(--error); }
        
        .quiz-result-message {
            font-size: 17px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .quiz-retry-btn {
            background: transparent;
            color: var(--purple);
            border: 2px solid var(--purple);
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-retry-btn:hover {
            background: var(--purple);
            color: white;
            transform: translateY(-2px);
        }
        
        .quiz-loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        /* Loading */
        .loading-detail { 
            text-align: center; 
            padding: 80px 20px; 
        }
        .spinner {
            width: 60px; 
            height: 60px;
            border: 4px solid rgba(91,45,142,0.15);
            border-top-color: var(--purple);
            border-radius: 50%;
            margin: auto auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ✅ NOTIFICATION TOAST */
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 10002;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.4s ease;
            max-width: 400px;
        }
        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .notification.warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .notification-icon { font-size: 20px; }
        .notification-content { flex: 1; }
        .notification-title { font-size: 15px; margin-bottom: 2px; }
        .notification-message { font-size: 13px; opacity: 0.9; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* ✅ Celebration Overlay */
        .celebration-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .celebration-overlay .emoji { 
            font-size: 72px; 
            margin-bottom: 20px; 
            animation: bounce 0.6s ease infinite alternate; 
        }
        @keyframes bounce { 
            from { transform: translateY(0); } 
            to { transform: translateY(-10px); } 
        }
        .celebration-overlay h2 { 
            font-size: 36px; 
            margin-bottom: 12px; 
            font-family: 'Playfair Display', serif; 
        }
        .celebration-overlay p { 
            font-size: 18px; 
            color: var(--gray); 
            margin-bottom: 30px; 
        }
        .celebration-overlay .btn-group { 
            display: flex; 
            gap: 16px; 
            flex-wrap: wrap; 
            justify-content: center; 
        }
        .celebration-overlay .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .celebration-overlay .btn-primary {
            background: var(--success);
            color: white;
        }
        .celebration-overlay .btn-certificate {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
        }
        .celebration-overlay .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .celebration-overlay .btn:hover { 
            transform: translateY(-2px); 
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 2px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media(max-width: 1024px) {
            .course-detail-container { 
                grid-template-columns: 1fr; 
                padding: 0 24px;
            }
            .sidebar { 
                position: static;
                max-height: 300px;
                overflow-y: auto;
            }
        }
        
        @media(max-width: 768px) {
            .header-container { padding: 0 24px; }
            .nav-center { display: none; }
            .course-hero { padding: 100px 24px 40px; }
            .content-area { padding: 24px; }
            .quiz-options { padding-left: 0; }
            .notification {
                top: 80px;
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>

    <!-- ✅ TIMER DISPLAY -->
    <div id="quiz-timer-box" style="display:none; position:fixed; top:100px; right:20px; background:#ffffff; padding:12px 20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.15); font-family:'DM Sans',sans-serif; z-index:10001; border-left:4px solid #5b2d8e;">
        <div style="font-size:12px; color:#6b7280; margin-bottom:4px;">⏱️ Sisa Waktu</div>
        <div id="timer-display" style="font-size:24px; font-weight:700; color:#1f2937; letter-spacing:1px;">--:--</div>
    </div>

    <!-- ✅ FIXED HEADER - Minimalist (Like Dashboard) -->
    <header class="header">
        <div class="header-container">
            <a href="dashboard.html" class="logo">SPEAK<span>OUT</span></a>
            
            <!-- ✅ Center Navigation - Only Dashboard -->
            <div class="nav-center">
                <ul class="nav-menu">
                    <li><a href="dashboard.html" class="active">Dashboard</a></li>
                </ul>
            </div>
            
            <!-- ✅ User Menu -->
            <div class="user-menu">
                <span class="user-name" id="userName">Loading...</span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <!-- PROFESSIONAL HERO -->
    <section class="course-hero">
        <div class="course-hero-content">
            <h1 id="page-title">Loading...</h1>
            <p>Pilih pertemuan di sidebar untuk melihat materi pembelajaran</p>
            
            <!-- ✅ Course Meta Tags -->
            <div class="course-meta-tags" id="courseMetaHero" style="display:none;">
                <span class="meta-tag category" id="metaCategory"></span>
                <span class="meta-tag level" id="metaLevel"></span>
                <span class="meta-tag duration" id="metaDuration"></span>
            </div>
            
            <!-- ✅ Progress Bar -->
            <div class="course-progress-bar">
                <div class="progress-info">
                    <div class="progress-label">Course Progress</div>
                    <div class="progress-value" id="courseProgressValue">0%</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="courseProgressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <div class="course-detail-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>📚 Daftar Pertemuan</h3>
            </div>
            <div id="meeting-list" class="meeting-list">
                <div class="loading-detail"><div class="spinner"></div></div>
            </div>
        </aside>

        <!-- Content -->
        <main class="content-area">
            <div class="content-header">
                <span id="meeting-label">Pertemuan 1</span>
                <h2 id="meeting-title">Loading...</h2>
            </div>
            
            <div id="content-container">
                <div class="loading-detail"><div class="spinner"></div></div>
            </div>
        </main>

    </div>

    <!-- ✅ EXTERNAL JS FILES -->
    <script src="js/api.js"></script>
    <script src="js/course-details.js"></script>

    <!-- ✅ NOTIFICATION & TIMER SCRIPTS -->
    <script>
    /**
     * 🔔 NOTIFICATION TOAST
     */
    function showNotification(message, type = 'success') {
        const existingNotification = document.querySelector('.notification');
        if (existingNotification) {
            existingNotification.remove();
        }

        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        
        const icons = { success: '✅', error: '❌', warning: '⚠️' };
        const titles = { success: 'Berhasil!', error: 'Gagal!', warning: 'Perhatian!' };

        notification.innerHTML = `
            <span class="notification-icon">${icons[type]}</span>
            <div class="notification-content">
                <div class="notification-title">${titles[type]}</div>
                <div class="notification-message">${message}</div>
            </div>
        `;

        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.animation = 'slideOutRight 0.4s ease forwards';
            setTimeout(() => {
                notification.remove();
            }, 400);
        }, 4000);
    }

    /**
     * 📊 RENDER COURSE META INFO
     */
    function renderCourseMeta(courseData) {
        const metaContainer = document.getElementById('courseMetaHero');
        const metaCategory = document.getElementById('metaCategory');
        const metaLevel = document.getElementById('metaLevel');
        const metaDuration = document.getElementById('metaDuration');
        
        if (!metaContainer || !courseData) return;
        
        let hasMeta = false;
        
        if (courseData.category) {
            metaCategory.textContent = `📚 ${courseData.category}`;
            metaCategory.style.display = 'inline-flex';
            hasMeta = true;
        } else {
            metaCategory.style.display = 'none';
        }
        
        if (courseData.level) {
            metaLevel.textContent = `🎓 ${courseData.level}`;
            metaLevel.style.display = 'inline-flex';
            hasMeta = true;
        } else {
            metaLevel.style.display = 'none';
        }
        
        if (courseData.duration) {
            metaDuration.textContent = `⏱️ ${courseData.duration}`;
            metaDuration.style.display = 'inline-flex';
            hasMeta = true;
        } else {
            metaDuration.style.display = 'none';
        }
        
        if (hasMeta) {
            metaContainer.style.display = 'flex';
        }
    }

    /**
     * 📥 DOWNLOAD CERTIFICATE
     */
    async function downloadCertificate(courseId) {
        const token = localStorage.getItem('speakout_token');
        if (!token) {
            showNotification('Silakan login terlebih dahulu', 'error');
            window.location.href = 'login.html';
            return;
        }
        
        try {
            showNotification('Mempersiapkan certificate...', 'warning');
            
            const response = await fetch(`http://127.0.0.1:8000/api/user/certificates/${courseId}/download`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                }
            });
            
            if (!response.ok) {
                if (response.status === 404) {
                    showNotification('Certificate belum tersedia. Selesaikan semua lesson terlebih dahulu!', 'error');
                    return;
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SpeakOut-Certificate-${courseId}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
            
            showNotification('🎉 Certificate berhasil didownload!', 'success');
            
        } catch (error) {
            console.error('Download certificate error:', error);
            showNotification('Gagal mendownload certificate. Silakan coba lagi.', 'error');
        }
    }

    /**
     * ⏱️ QUIZ TIMER LOGIC
     */
    let timerInterval = null;
    let remainingSeconds = 0;

    function startQuizTimer(timeLimitMinutes) {
        if (timerInterval) {
            clearInterval(timerInterval);
        }

        remainingSeconds = (timeLimitMinutes && timeLimitMinutes > 0) 
            ? timeLimitMinutes * 60 
            : 60 * 60;
        
        const timerBox = document.getElementById('quiz-timer-box');
        if (timerBox) {
            timerBox.style.display = 'block';
        }

        timerInterval = setInterval(() => {
            remainingSeconds--;
            
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            const display = document.getElementById('timer-display');
            
            if (display) {
                display.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                if (remainingSeconds <= 300) {
                    display.style.color = '#dc2626';
                    const timerBox = document.getElementById('quiz-timer-box');
                    if (timerBox) {
                        timerBox.style.borderLeftColor = '#dc2626';
                    }
                }
            }

            if (remainingSeconds <= 0) {
                clearInterval(timerInterval);
                showNotification('⏰ Waktu quiz telah habis! Jawaban akan disubmit otomatis.', 'warning');
                
                if (typeof currentQuizId !== 'undefined' && currentQuizId) {
                    if (typeof submitQuizAnswers === 'function') {
                        submitQuizAnswers(currentQuizId);
                    }
                }
                
                return;
            }
        }, 1000);
    }

    function stopQuizTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const timerBox = document.getElementById('quiz-timer-box');
        if (timerBox) {
            timerBox.style.display = 'none';
        }
    }

    window.addEventListener('beforeunload', () => {
        if (timerInterval) {
            clearInterval(timerInterval);
        }
    });

    /**
     * 🎉 CELEBRATION OVERLAY
     */
    function showCourseCompletedCelebration(courseId) {
        const existing = document.querySelector('.celebration-overlay');
        if (existing) existing.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'celebration-overlay';
        overlay.innerHTML = `
            <div class="emoji">🎉</div>
            <h2>Course Completed!</h2>
            <p>Selamat! Kamu telah menyelesaikan course ini dan mendapatkan certificate. 🏆</p>
            <div class="btn-group">
                <button class="btn btn-certificate" onclick="downloadCertificate(${courseId})">
                    📥 Download Certificate
                </button>
                <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                    🏠 View Dashboard
                </button>
                <button class="btn btn-secondary" onclick="this.closest('.celebration-overlay').remove()">
                    ✕ Keep Learning
                </button>
            </div>
        `;
        document.body.appendChild(overlay);
        createConfetti(overlay);
        showNotification('🎉 Selamat! Kamu telah menyelesaikan course!', 'success');
    }

    function createConfetti(container) {
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#a67cda', '#ef4444'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.cssText = `background:${colors[i%colors.length]};left:${Math.random()*100}%;top:-10px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*0.5}s;`;
            container.appendChild(confetti);
        }
    }

    /**
     * 🔄 PATCH: Integrate with course-details.js
     */
    document.addEventListener('DOMContentLoaded', function() {
        // Update user name in header
        const user = api.getUser();
        if (user?.name) {
            const userName = user.name.split(' ')[0];
            document.getElementById('userName').textContent = userName;
        }
        
        // Setup logout
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
            // ✅ Clear semua progress user saat ini
             clearAllUserProgress();
        
                api.logout();
            }
        });
        
        // Wait for course-details.js to load courseData
        const checkCourseData = setInterval(() => {
            if (typeof courseData !== 'undefined' && courseData) {
                renderCourseMeta(courseData);
                clearInterval(checkCourseData);
            }
        }, 100);
        
        setTimeout(() => clearInterval(checkCourseData), 5000);
    });

    /**
     * 🔔 Override toggleLessonComplete for notifications
     */
    const originalToggleLessonComplete = window.toggleLessonComplete;
    window.toggleLessonComplete = async function(courseId, meetingId, isCompleted) {
        try {
            await originalToggleLessonComplete(courseId, meetingId, isCompleted);
            showNotification(
                isCompleted ? 'Progress berhasil disimpan!' : 'Progress diupdate',
                'success'
            );
        } catch (error) {
            showNotification('Gagal mengupdate progress', 'error');
        }
    };
    </script>

</body>
