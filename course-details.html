<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - SpeakOut</title>

    <!-- Fonts: Sama persis dengan courses.html -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ===== COPY CSS VARIABLES DARI courses.html ===== */
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }

        a { text-decoration: none; }

        /* ===== HEADER (Sama persis) ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10,15,35,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--blue-accent); }

        .nav-menu { display: flex; gap: 36px; list-style: none; }
        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-menu a:hover, .nav-menu .active { color: var(--white); }

        .btn-login {
            background: var(--blue);
            color: white;
            padding: 11px 26px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-login:hover { background: var(--blue-light); transform: translateY(-1px); }

        /* ===== HERO MINI (Konsisten dengan courses.html) ===== */
        .page-hero {
            width: 100%;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            text-align: center;
        }
        .page-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 900;
            margin-bottom: 10px;
        }
        .page-hero p { color: var(--gray); font-size: 16px; }

        /* ===== LAYOUT DETAIL COURSE ===== */
        .course-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            min-height: 60vh;
        }

        /* Sidebar Kiri */
        .sidebar {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(91,45,142,0.1);
        }
        .meeting-item {
            display: block;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #555;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .meeting-item:hover { background: rgba(91,45,142,0.08); color: var(--purple); }
        .meeting-item.active {
            background: var(--purple);
            color: white;
            font-weight: 600;
        }

        /* Content Kanan */
        .content-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
        }
        .content-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .content-header span {
            color: var(--purple);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* List Lesson */
        .lesson-list { list-style: none; }
        .lesson-item {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .lesson-icon {
            width: 36px;
            height: 36px;
            background: rgba(91,45,142,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple);
            font-weight: bold;
            font-size: 14px;
        }
        .lesson-link {
            color: var(--blue);
            font-weight: 500;
            font-size: 16px;
            transition: color 0.2s;
        }
        .lesson-link:hover { color: var(--purple); text-decoration: underline; }
        
        .lesson-tag {
            margin-left: auto;
            background: rgba(10,77,155,0.1);
            color: var(--blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Loading State */
        .loading-detail { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(91,45,142,0.15);
            border-top-color: var(--purple);
            border-radius: 50%;
            margin: auto auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media(max-width: 992px) {
            .course-detail-container { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
        @media(max-width: 768px) {
            .header-container { padding: 0 24px; }
            .course-detail-container { padding: 0 24px; margin: 20px auto; }
            .content-area { padding: 24px; }
        }
    </style>
</head>
<body>

<!-- HEADER (Sama persis dengan courses.html) -->
<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html" class="active">Course</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>
        <a href="login.html" class="btn-login">Login</a>
    </div>
</header>

<!-- HERO MINI -->
<section class="page-hero">
    <h1 id="page-title">English For Family</h1>
    <p>Pilih pertemuan di sebelah kiri untuk melihat materi</p>
</section>

<!-- MAIN CONTENT -->
<div class="course-detail-container">
    
    <!-- Sidebar: Daftar Pertemuan -->
    <aside class="sidebar">
        <h3>Daftar Pertemuan</h3>
        <div id="meeting-list">
            <!-- Nanti diisi oleh JavaScript -->
            <div class="loading-detail"><div class="spinner"></div></div>
        </div>
    </aside>

    <!-- Content: Daftar Materi -->
    <main class="content-area">
        <div class="content-header">
            <span id="meeting-label">Pertemuan 1</span>
            <h2 id="meeting-title">Family 1</h2>
        </div>
        
        <ul class="lesson-list" id="lesson-list">
            <!-- Nanti diisi oleh JavaScript -->
            <div class="loading-detail"><div class="spinner"></div></div>
        </ul>
    </main>

</div>

<!-- Script: Nanti kita buat file js/course-details.js -->
<script src="js/course-details.js"></script>

</body>
</html>
