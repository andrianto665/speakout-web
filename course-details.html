<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - SpeakOut</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }
        a { text-decoration: none; }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10,15,35,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--blue-accent); }
        .nav-menu { display: flex; gap: 36px; list-style: none; }
        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-menu a:hover, .nav-menu .active { color: var(--white); }
        .btn-login {
            background: var(--blue);
            color: white;
            padding: 11px 26px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn-login:hover { background: var(--blue-light); transform: translateY(-1px); }

        /* ===== HERO ===== */
        .page-hero {
            width: 100%;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            text-align: center;
        }
        .page-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 900;
            margin-bottom: 10px;
        }
        .page-hero p { color: var(--gray); font-size: 16px; }

        /* ===== LAYOUT ===== */
        .course-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            min-height: 60vh;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(91,45,142,0.1);
        }
        .meeting-item {
            display: block;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #555;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .meeting-item:hover { background: rgba(91,45,142,0.08); color: var(--purple); }
        .meeting-item.active {
            background: var(--purple);
            color: white;
            font-weight: 600;
        }

        /* Content */
        .content-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
        }
        .content-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .content-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .content-header span {
            color: var(--purple);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Lesson List */
        .lesson-list { list-style: none; }
        .lesson-item {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .lesson-icon {
            width: 36px;
            height: 36px;
            background: rgba(91,45,142,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple);
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .lesson-link {
            color: var(--blue);
            font-weight: 500;
            font-size: 16px;
            transition: color 0.2s;
            flex: 1;
            cursor: pointer;
        }
        .lesson-link:hover { color: var(--purple); text-decoration: underline; }
        .lesson-link.disabled {
            color: var(--gray);
            cursor: not-allowed;
            pointer-events: none;
        }
        .lesson-tag {
            background: rgba(10,77,155,0.1);
            color: var(--blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        
        /* ✅ Checkbox "Mark Done" */
        .lesson-complete {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
            flex-shrink: 0;
        }
        .lesson-complete input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--success);
        }
        .lesson-complete label {
            font-size: 13px;
            color: var(--gray);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .lesson-complete input:checked + label {
            color: var(--success);
            font-weight: 500;
        }

        /* 🔥 QUIZ UI STYLES */
        .quiz-container {
            background: var(--surface2);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
        }
        
        /* 🔥 PROGRESS BAR */
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0f0;
        }
        .quiz-progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            min-width: 80px;
        }
        .quiz-progress-bar {
            flex: 1;
            height: 8px;
            background: #e0e0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .quiz-progress-fill {
            height: 100%;
            background: var(--purple);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .quiz-question {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0f0;
        }
        .quiz-question:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .quiz-question-number {
            display: inline-block;
            background: var(--purple);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: 600;
            font-size: 14px;
            margin-right: 10px;
        }
        .quiz-question-text {
            font-weight: 500;
            font-size: 16px;
            color: var(--dark);
            margin: 10px 0 15px;
            line-height: 1.5;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border: 2px solid #e0e0f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quiz-option:hover {
            border-color: var(--purple-light);
            background: rgba(91,45,142,0.05);
        }
        .quiz-option.selected {
            border-color: var(--purple);
            background: rgba(91,45,142,0.1);
        }
        .quiz-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--purple);
            cursor: pointer;
        }
        .quiz-option label {
            flex: 1;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        .quiz-submit-btn {
            background: var(--purple);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }
        .quiz-submit-btn:hover {
            background: var(--purple-light);
            transform: translateY(-2px);
        }
        .quiz-submit-btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
        }
        .quiz-result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .quiz-result.passed {
            background: var(--success-light);
            border: 2px solid var(--success);
            color: #065f46;
        }
        .quiz-result.failed {
            background: #fef2f2;
            border: 2px solid var(--error);
            color: #991b1b;
        }
        .quiz-result-score {
            font-size: 48px;
            font-weight: 900;
            margin: 10px 0;
        }
        .quiz-result.passed .quiz-result-score { color: var(--success); }
        .quiz-result.failed .quiz-result-score { color: var(--error); }
        .quiz-result-message {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .quiz-retry-btn {
            background: transparent;
            color: var(--purple);
            border: 2px solid var(--purple);
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quiz-retry-btn:hover {
            background: var(--purple);
            color: white;
        }
        .quiz-loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        /* Loading */
        .loading-detail { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(91,45,142,0.15);
            border-top-color: var(--purple);
            border-radius: 50%;
            margin: auto auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ✅ Celebration Overlay */
        .celebration-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .celebration-overlay .emoji { font-size: 72px; margin-bottom: 20px; animation: bounce 0.6s ease infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .celebration-overlay h2 { font-size: 32px; margin-bottom: 12px; font-family: 'Playfair Display', serif; }
        .celebration-overlay p { font-size: 18px; color: var(--gray); margin-bottom: 30px; }
        .celebration-overlay .btn-group { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .celebration-overlay .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .celebration-overlay .btn-primary {
            background: var(--success);
            color: white;
        }
        .celebration-overlay .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .celebration-overlay .btn:hover { transform: translateY(-2px); }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 2px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media(max-width: 992px) {
            .course-detail-container { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
        @media(max-width: 768px) {
            .header-container { padding: 0 24px; }
            .course-detail-container { padding: 0 24px; margin: 20px auto; }
            .content-area { padding: 24px; }
            .lesson-item { flex-wrap: wrap; }
            .lesson-complete { margin-left: 51px; margin-top: 8px; }
        }
    </style>
</head>
<body>

<!-- ✅ FIXED HEADER: Link ke dashboard.html (bukan index.html) -->
<header class="header">
    <div class="header-container">
        <a href="dashboard.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="dashboard.html#my-courses">My Courses</a></li>
                <li><a href="courses.html">All Courses</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>
        <button id="logoutBtn" class="btn-login">Logout</button>
    </div>
</header>

<!-- HERO -->
<section class="page-hero">
    <h1 id="page-title">Loading...</h1>
    <p>Pilih pertemuan di sebelah kiri untuk melihat materi</p>
</section>

<!-- MAIN CONTENT -->
<div class="course-detail-container">
    
    <!-- Sidebar: Daftar Pertemuan -->
    <aside class="sidebar">
        <h3>Daftar Pertemuan</h3>
        <div id="meeting-list">
            <div class="loading-detail"><div class="spinner"></div></div>
        </div>
    </aside>

    <!-- Content: Daftar Materi / Quiz UI -->
    <main class="content-area">
        
        <!-- ✅ NEW: Back to Dashboard Button -->
        <div style="margin-bottom: 20px;">
            <a href="dashboard.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--purple); text-decoration: none; font-weight: 600; font-size: 14px; transition: gap 0.2s;">
                <span style="font-size: 16px;">←</span> Back to Dashboard
            </a>
        </div>
        
        <div class="content-header">
            <span id="meeting-label">Pertemuan 1</span>
            <h2 id="meeting-title">Loading...</h2>
        </div>
        
        <!-- ✅ Container untuk Lesson List ATAU Quiz UI -->
        <div id="content-container">
            <ul class="lesson-list" id="lesson-list">
                <div class="loading-detail"><div class="spinner"></div></div>
            </ul>
        </div>
    </main>

</div>

<!-- ✅ EXTERNAL JS FILES -->
<script src="js/api.js"></script>
<script src="js/course-details.js"></script>

</body>
</html>
