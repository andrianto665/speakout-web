<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakOut Quiz - Multiple Question Types</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7B2D8E;
            --primary-light: #9B4DCA;
            --primary-dark: #5A1D6B;
            --primary-bg: #F3E5F5;
            --accent: #FF6B35;
            --accent-light: #FFB088;
            --success: #7B2D8E;
            --success-bg: #F3E5F5;
            --error: #FF6B35;
            --error-bg: #FFF0E8;
            --white: #ffffff;
            --gray-light: #f7f7f7;
            --gray-border: #e5e5e5;
            --gray-text: #afafaf;
            --text-dark: #3c3c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--white);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--gray-text);
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .close-btn:hover { color: var(--primary); }
        
        .progress-container {
            flex: 1;
            height: 16px;
            background: var(--gray-border);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        
        .hearts {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            font-weight: 800;
            color: #ff4b4b;
        }
        
        .heart-icon { font-size: 28px; }
        
        /* ===== MAIN CONTENT ===== */
        .quiz-container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 24px 100px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-light);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .category-icon {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        .question-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 40px;
            line-height: 1.3;
        }
        
        /* ===== TIPE 1: IMAGE-BASED (Sudah Ada) ===== */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .option-card {
            background: var(--white);
            border: 2px solid var(--gray-border);
            border-radius: 16px;
            padding: 24px 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .option-card:hover {
            background: var(--gray-light);
            border-color: #d0d0d0;
            transform: translateY(-2px);
        }
        
        .option-card.selected {
            background: var(--primary-bg);
            border-color: var(--primary-light);
            border-width: 3px;
        }
        
        .option-card.correct {
            background: var(--success-bg);
            border-color: var(--primary);
            border-width: 3px;
        }
        
        .option-card.wrong {
            background: var(--error-bg);
            border-color: var(--accent);
            border-width: 3px;
        }
        
        .emoji { font-size: 80px; line-height: 1; }
        .label { font-size: 18px; font-weight: 700; color: var(--text-dark); }
        
        .option-number {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: 2px solid var(--gray-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-text);
        }
        
        /* ===== TIPE 2: TRANSLATION (BARU) ===== */
        .character-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--gray-light);
            border-radius: 20px;
        }
        
        .character-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
        }
        
        .speech-bubble {
            background: var(--white);
            padding: 20px 28px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 12px solid var(--white);
        }
        
        .translation-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .translation-option {
            background: var(--white);
            border: 2px solid var(--gray-border);
            border-radius: 16px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .translation-option:hover {
            background: var(--gray-light);
            border-color: #d0d0d0;
            transform: translateX(4px);
        }
        
        .translation-option.selected {
            background: var(--primary-bg);
            border-color: var(--primary-light);
            border-width: 3px;
        }
        
        .translation-option.correct {
            background: var(--success-bg);
            border-color: var(--primary);
            border-width: 3px;
        }
        
        .translation-option.wrong {
            background: var(--error-bg);
            border-color: var(--accent);
            border-width: 3px;
        }
        
        .option-number-small {
            width: 32px;
            height: 32px;
            border: 2px solid var(--gray-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-text);
            flex-shrink: 0;
        }
        
        .option-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            flex: 1;
        }
        
        /* ===== TIPE 3: FILL IN THE BLANK (BARU) ===== */
        .audio-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--gray-light);
            border-radius: 20px;
        }
        
        .character-bear {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            flex-shrink: 0;
        }
        
        .audio-bubble {
            background: var(--white);
            padding: 20px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .audio-btn {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .audio-btn:hover {
            background: var(--primary-light);
            transform: scale(1.1);
        }
        
        .audio-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .sentence-container {
            margin-bottom: 40px;
        }
        
        .sentence {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 2;
        }
        
        .blank {
            display: inline-block;
            min-width: 150px;
            border-bottom: 3px solid var(--primary);
            padding: 0 12px;
            color: var(--primary);
        }
        
        .word-bank {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .word-chip {
            background: var(--white);
            border: 2px solid var(--gray-border);
            border-radius: 12px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .word-chip:hover {
            background: var(--gray-light);
            border-color: #d0d0d0;
            transform: translateY(-2px);
        }
        
        .word-chip.selected {
            background: var(--primary-bg);
            border-color: var(--primary-light);
            color: var(--primary);
        }
        
        .word-chip.used {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* ===== FOOTER ===== */
        .quiz-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 2px solid var(--gray-border);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-skip {
            background: var(--white);
            border: 2px solid var(--gray-border);
            border-radius: 16px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 800;
            color: var(--gray-text);
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .btn-skip:hover {
            background: var(--gray-light);
            color: var(--text-dark);
            border-color: var(--primary-light);
        }
        
        .btn-check {
            background: var(--gray-border);
            border: none;
            border-radius: 16px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 800;
            color: var(--gray-text);
            cursor: not-allowed;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .btn-check.active {
            background: var(--primary);
            color: var(--white);
            cursor: pointer;
            box-shadow: 0 4px 0 var(--primary-dark);
        }
        
        .btn-check.active:hover { background: var(--primary-light); }
        
        .btn-check.active:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--primary-dark);
        }
        
        /* ===== FEEDBACK BAR ===== */
        .feedback-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
        
        .feedback-bar.correct {
            background: var(--success-bg);
            display: flex;
        }
        
        .feedback-bar.wrong {
            background: var(--error-bg);
            display: flex;
        }
        
        .feedback-content {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .feedback-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        
        .feedback-bar.correct .feedback-icon {
            background: var(--primary);
            color: white;
        }
        
        .feedback-bar.wrong .feedback-icon {
            background: var(--accent);
            color: white;
        }
        
        .feedback-text h3 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        
        .feedback-bar.correct .feedback-text h3 { color: var(--primary-dark); }
        .feedback-bar.wrong .feedback-text h3 { color: var(--accent); }
        
        .feedback-text p {
            font-size: 14px;
            color: var(--text-dark);
        }
        
        .btn-continue {
            border: none;
            border-radius: 16px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 800;
            color: var(--white);
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .feedback-bar.correct .btn-continue {
            background: var(--primary);
            box-shadow: 0 4px 0 var(--primary-dark);
        }
        
        .feedback-bar.wrong .btn-continue {
            background: var(--accent);
            box-shadow: 0 4px 0 #D95A2A;
        }
        
        .btn-continue:hover { background: var(--primary-light); }
        .feedback-bar.wrong .btn-continue:hover { background: var(--accent-light); }
        
        .btn-continue:active {
            transform: translateY(4px);
            box-shadow: 0 0 0;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-title { font-size: 24px; }
            .emoji { font-size: 60px; }
            .character-container { flex-direction: column; }
            .speech-bubble::before { display: none; }
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="close-btn" onclick="closeQuiz()">✕</button>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="hearts">
            <span class="heart-icon">❤️</span>
            <span id="heartsCount">5</span>
        </div>
    </div>

    <!-- MAIN QUIZ CONTENT -->
    <div class="quiz-container" id="quizContent">
        <!-- Content akan di-replace oleh JavaScript -->
    </div>

    <!-- FOOTER -->
    <div class="quiz-footer" id="quizFooter">
        <div class="footer-content">
            <button class="btn-skip" onclick="skipQuestion()">LOMPATI</button>
            <button class="btn-check" id="btnCheck" onclick="checkAnswer()" disabled>PERIKSA</button>
        </div>
    </div>

    <!-- FEEDBACK BAR -->
    <div class="feedback-bar" id="feedbackBar">
        <div class="feedback-content">
            <div class="feedback-icon" id="feedbackIcon">✓</div>
            <div class="feedback-text">
                <h3 id="feedbackTitle">Bagus!</h3>
                <p id="feedbackMessage"></p>
            </div>
            <button class="btn-continue" onclick="nextQuestion()">LANJUTKAN</button>
        </div>
    </div>

    <script>
        // ===== DATA SOAL =====
        const questions = [
            {
                type: 'image', // TIPE 1: Image-based
                category: 'KOSAKATA BARU',
                question: 'Mana yang artinya "gula"?',
                options: [
                    { emoji: '🥛', label: 'milk', correct: false },
                    { emoji: '☕', label: 'coffee', correct: false },
                    { emoji: '🍬', label: 'sugar', correct: true }
                ]
            },
            {
                type: 'translation', // TIPE 2: Translation
                category: 'POLA BARU',
                question: 'Pilih arti yang benar',
                character: '👨',
                speech: 'gula',
                options: [
                    { text: 'welcome', correct: false },
                    { text: 'sugar', correct: true },
                    { text: 'hello', correct: false }
                ]
            },
            {
                type: 'fillblank', // TIPE 3: Fill in the blank
                category: 'POLA BARU',
                question: 'Ikuti polanya',
                character: '🐻',
                audioText: 'Tea with milk.',
                sentence: 'Tea ___ sugar.',
                correctAnswer: 'with',
                wordBank: ['with', 'sugar', 'milk']
            }
        ];

        // ===== STATE =====
        let currentQuestion = 0;
        let selectedAnswer = null;
        let hearts = 5;
        let selectedWords = [];

        // ===== RENDER FUNCTIONS =====
        
        function renderQuestion() {
            const quizContent = document.getElementById('quizContent');
            const question = questions[currentQuestion];
            
            // Reset state
            selectedAnswer = null;
            selectedWords = [];
            document.getElementById('btnCheck').disabled = true;
            document.getElementById('btnCheck').classList.remove('active');
            
            // Render berdasarkan tipe
            if (question.type === 'image') {
                renderImageQuestion(quizContent, question);
            } else if (question.type === 'translation') {
                renderTranslationQuestion(quizContent, question);
            } else if (question.type === 'fillblank') {
                renderFillBlankQuestion(quizContent, question);
            }
            
            // Update progress
            updateProgress();
        }
        
        function renderImageQuestion(container, question) {
            container.innerHTML = `
                <div class="category-badge">
                    <div class="category-icon">✨</div>
                    <span>${question.category}</span>
                </div>
                <h1 class="question-title">${question.question}</h1>
                <div class="options-grid">
                    ${question.options.map((opt, idx) => `
                        <div class="option-card" onclick="selectOption(this, ${idx})">
                            <div class="emoji">${opt.emoji}</div>
                            <div class="label">${opt.label}</div>
                            <div class="option-number">${idx + 1}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderTranslationQuestion(container, question) {
            container.innerHTML = `
                <div class="category-badge">
                    <div class="category-icon">✨</div>
                    <span>${question.category}</span>
                </div>
                <h1 class="question-title">${question.question}</h1>
                <div class="character-container">
                    <div class="character-avatar">${question.character}</div>
                    <div class="speech-bubble">${question.speech}</div>
                </div>
                <div class="translation-options">
                    ${question.options.map((opt, idx) => `
                        <div class="translation-option" onclick="selectOption(this, ${idx})">
                            <div class="option-number-small">${idx + 1}</div>
                            <div class="option-text">${opt.text}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderFillBlankQuestion(container, question) {
            const sentenceParts = question.sentence.split('___');
            
            container.innerHTML = `
                <div class="category-badge">
                    <div class="category-icon">✨</div>
                    <span>${question.category}</span>
                </div>
                <h1 class="question-title">${question.question}</h1>
                <div class="audio-container">
                    <div class="character-bear">${question.character}</div>
                    <div class="audio-bubble">
                        <button class="audio-btn" onclick="playAudio()">🔊</button>
                        <div class="audio-text">${question.audioText}</div>
                    </div>
                </div>
                <div class="sentence-container">
                    <div class="sentence">
                        ${sentenceParts[0]}<span class="blank" id="blankSpace">&nbsp;</span>${sentenceParts[1] || ''}
                    </div>
                </div>
                <div class="word-bank">
                    ${question.wordBank.map(word => `
                        <div class="word-chip" onclick="selectWord('${word}', this)">${word}</div>
                    `).join('')}
                </div>
            `;
        }
        
        // ===== SELECTION FUNCTIONS =====
        
        function selectOption(element, index) {
            // Clear previous selection
            document.querySelectorAll('.option-card, .translation-option').forEach(el => {
                el.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedAnswer = index;
            
            // Enable check button
            const btnCheck = document.getElementById('btnCheck');
            btnCheck.disabled = false;
            btnCheck.classList.add('active');
        }
        
        function selectWord(word, element) {
            if (element.classList.contains('used')) return;
            
            // Clear previous
            document.querySelectorAll('.word-chip').forEach(chip => {
                chip.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedAnswer = word;
            selectedWords = [element];
            
            // Show in blank
            document.getElementById('blankSpace').textContent = word;
            
            // Enable check button
            const btnCheck = document.getElementById('btnCheck');
            btnCheck.disabled = false;
            btnCheck.classList.add('active');
        }
        
        function playAudio() {
            // Simulasi play audio (nanti bisa pakai Web Speech API)
            const btn = event.currentTarget;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
            
            // Optional: Text-to-speech
            if ('speechSynthesis' in window) {
                const question = questions[currentQuestion];
                const utterance = new SpeechSynthesisUtterance(question.audioText);
                utterance.lang = 'en-US';
                speechSynthesis.speak(utterance);
            }
        }
        
        // ===== CHECK ANSWER =====
        
        function checkAnswer() {
            const question = questions[currentQuestion];
            const feedbackBar = document.getElementById('feedbackBar');
            const feedbackIcon = document.getElementById('feedbackIcon');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackMessage = document.getElementById('feedbackMessage');
            const quizFooter = document.getElementById('quizFooter');
            
            let isCorrect = false;
            
            if (question.type === 'image' || question.type === 'translation') {
                isCorrect = question.options[selectedAnswer].correct;
                
                // Highlight selected
                const cards = document.querySelectorAll('.option-card, .translation-option');
                if (isCorrect) {
                    cards[selectedAnswer].classList.add('correct');
                } else {
                    cards[selectedAnswer].classList.add('wrong');
                    // Show correct answer
                    question.options.forEach((opt, idx) => {
                        if (opt.correct) {
                            cards[idx].classList.add('correct');
                        }
                    });
                }
            } else if (question.type === 'fillblank') {
                isCorrect = selectedAnswer === question.correctAnswer;
                
                if (isCorrect) {
                    document.getElementById('blankSpace').style.color = 'var(--primary)';
                } else {
                    document.getElementById('blankSpace').style.color = 'var(--accent)';
                    // Show correct
                    document.getElementById('blankSpace').textContent = question.correctAnswer;
                }
            }
            
            // Show feedback
            if (isCorrect) {
                feedbackBar.classList.add('correct');
                feedbackBar.classList.remove('wrong');
                feedbackIcon.textContent = '✓';
                feedbackTitle.textContent = 'Bagus!';
                feedbackMessage.textContent = '';
            } else {
                feedbackBar.classList.add('wrong');
                feedbackBar.classList.remove('correct');
                feedbackIcon.textContent = '✗';
                feedbackTitle.textContent = 'Jawaban yang benar:';
                
                if (question.type === 'image') {
                    const correct = question.options.find(o => o.correct);
                    feedbackMessage.textContent = `${correct.label} ${correct.emoji}`;
                } else if (question.type === 'translation') {
                    const correct = question.options.find(o => o.correct);
                    feedbackMessage.textContent = correct.text;
                } else {
                    feedbackMessage.textContent = question.correctAnswer;
                }
                
                // Reduce hearts
                hearts--;
                document.getElementById('heartsCount').textContent = hearts;
            }
            
            quizFooter.style.display = 'none';
        }
        
        function nextQuestion() {
            // Reset UI
            document.getElementById('feedbackBar').classList.remove('correct', 'wrong');
            document.getElementById('feedbackBar').style.display = 'none';
            document.getElementById('quizFooter').style.display = 'flex';
            
            // Next question
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                // Quiz finished
                alert(`🎉 Kuis selesai!\n\nSkor: ${hearts}/5 hearts tersisa\nGreat job!`);
                currentQuestion = 0;
                hearts = 5;
                document.getElementById('heartsCount').textContent = hearts;
            }
            
            renderQuestion();
        }
        
        function skipQuestion() {
            if (confirm('Yakin mau lewati soal ini?')) {
                nextQuestion();
            }
        }
        
        function closeQuiz() {
            if (confirm('Yakin mau keluar dari kuis? Progress tidak akan disimpan.')) {
                window.history.back();
            }
        }
        
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('feedbackBar').style.display === 'flex') return;
            
            const question = questions[currentQuestion];
            
            if (question.type === 'image' || question.type === 'translation') {
                if (e.key === '1') selectOption(document.querySelectorAll('.option-card, .translation-option')[0], 0);
                if (e.key === '2') selectOption(document.querySelectorAll('.option-card, .translation-option')[1], 1);
                if (e.key === '3') selectOption(document.querySelectorAll('.option-card, .translation-option')[2], 2);
            }
            
            if (e.key === 'Enter' && selectedAnswer !== null) {
                checkAnswer();
            }
        });
        
        // Init
        renderQuestion();
    </script>

</body>
</html>
