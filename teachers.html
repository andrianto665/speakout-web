<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers - SpeakOut E-Course</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }

        a { text-decoration: none; }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10,15,35,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--blue-accent); }

        .nav-menu {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu .active { color: var(--white); }

        .btn-login {
            background: var(--blue);
            color: white;
            padding: 11px 26px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--blue-light);
            transform: translateY(-1px);
        }

        /* ===== HERO ===== */
        .hero {
            width: 100%;
            padding: 80px 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "Teachers";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 180px;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .hero-eyebrow-line {
            width: 32px;
            height: 2px;
            background: var(--blue-accent);
        }

        .hero-eyebrow span {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--blue-accent);
            font-weight: 500;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--purple-accent);
        }

        .hero p {
            font-size: clamp(14px, 1.5vw, 17px);
            line-height: 1.8;
            color: var(--gray);
            max-width: 600px;
            margin: auto;
            font-weight: 300;
        }

        /* ===== SECTION ===== */
        .teachers-section {
            padding: 70px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(91,45,142,0.15);
            border-top-color: var(--purple);
            border-radius: 50%;
            margin: auto auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== GRID - ✅ CHANGED TO 4 COLUMNS ===== */
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        /* ===== CARD - ✅ NEW DESIGN: Full Photo + Pattern ===== */
        .teacher-card {
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(91,45,142,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .teacher-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(91,45,142,0.25);
        }

        /* ✅ PHOTO CONTAINER WITH "INSTRUKTUR" PATTERN */
        .teacher-photo-container {
            position: relative;
            height: 360px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
            overflow: hidden;
        }

        /* Pattern "INSTRUKTUR" background */
        .teacher-photo-container::before {
            content: 'INSTRUKTUR';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'DM Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.12);
            text-align: center;
            z-index: 1;
            white-space: nowrap;
            letter-spacing: 3px;
        }

        /* Multiple layers of pattern */
        .teacher-photo-container::after {
            content: 'INSTRUKTUR\A INSTRUKTUR\A INSTRUKTUR\A INSTRUKTUR\A INSTRUKTUR\A INSTRUKTUR';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'DM Sans', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.06);
            text-align: center;
            white-space: pre;
            z-index: 1;
            line-height: 1.5;
            letter-spacing: 2px;
        }

        /* Teacher photo */
        .teacher-photo {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Fallback when photo not available */
        .teacher-photo-fallback {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, var(--purple-light) 0%, var(--blue-accent) 100%);
        }

        /* ===== TEACHER INFO ===== */
        .teacher-info {
            padding: 20px;
            background: white;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Name button with gradient */
        .teacher-name-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: white;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
    white-space: normal;
        }

        .teacher-name-btn:hover {
            background: linear-gradient(135deg, var(--purple-light) 0%, var(--blue-light) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 45, 142, 0.3);
        }

        /* Dynamic font sizing based on name length */
        .teacher-name-btn.short-name {
            font-size: 16px;
             letter-spacing: 1px;
        }

        .teacher-name-btn.medium-name {
            font-size: 14px;
            letter-spacing: 0.8px;
        }

        .teacher-name-btn.long-name {
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* ===== ERROR ===== */
        .error-state {
            text-align: center;
            padding: 80px 20px;
            color: #e53935;
            font-size: 18px;
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 1200px) {
            .teachers-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media(max-width: 992px) {
            .nav-menu { display: none; }
            .teachers-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .teacher-photo-container {
                height: 320px;
            }
        }

        @media(max-width: 768px) {
            .header-container { padding: 0 24px; }
            .hero::before { font-size: 80px; }
            .teacher-photo-container {
                height: 300px;
            }
        }

        @media(max-width: 560px) {
            .teachers-grid { grid-template-columns: 1fr; }
            .btn-login { padding: 10px 20px; font-size: 13px; }
            .teacher-photo-container {
                height: 360px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html">Course</a></li>
                <li><a href="teachers.html" class="active">Teachers</a></li>
            </ul>
        </nav>
        <a href="login.html" class="btn-login">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span>Tim Pengajar</span>
        <div class="hero-eyebrow-line"></div>
    </div>
    <h1>Expert <em>Instructors</em></h1>
    <p>
        Belajar bersama mentor profesional SpeakOut untuk meningkatkan
        skill public speaking dan bahasa Inggris secara aktif dan modern.
    </p>
</section>

<!-- TEACHERS -->
<section class="teachers-section">
    <div class="container">

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading teachers...</p>
        </div>

        <div id="teachersList" class="teachers-grid" style="display:none;"></div>

        <div id="errorState" class="error-state" style="display:none;">
            Gagal memuat data teachers.
        </div>

    </div>
</section>

<!-- API Service -->
<script src="js/api.js"></script>

<!-- Teachers Logic -->
<script>
/**
 * 📁 teachers.html - Load Teachers dengan Foto
 * 🎯 Menampilkan daftar tutor dengan foto dari public/assets/teachers/
 */

const TEACHERS_API = 'http://127.0.0.1:8000/api/teachers';

// Default teachers data (fallback jika API belum tersedia)
const defaultTeachers = [
    {
        id: 1,
        name: 'Martina Wati',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/martinawati.png',
        expertise: ['Speaking', 'Grammar', 'TOEFL']
    },
    {
        id: 2,
        name: 'Hafiz Varintio RA',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/hafishvarintiora.png',
        expertise: ['Conversation', 'Writing', 'Business']
    },
    {
        id: 3,
        name: 'Visa Ranico',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/visaranico.png',
        expertise: ['Pronunciation', 'Listening', 'IELTS']
    },
    {
        id: 4,
        name: 'Krisna Islami',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/krisnaislami.png',
        expertise: ['Vocabulary', 'Reading', 'TOEFL']
    }
];

// ========================================================================
// INIT
// ========================================================================
document.addEventListener('DOMContentLoaded', () => {
    loadTeachers();
});

// ========================================================================
// LOAD TEACHERS
// ========================================================================
async function loadTeachers() {
    const loading = document.getElementById('loadingState');
    const grid = document.getElementById('teachersList');
    const error = document.getElementById('errorState');

    try {
        // Try to fetch from API
        const response = await fetch(TEACHERS_API, {
            headers: { 'Accept': 'application/json' }
        });

        let teachers = [];
        
        if (response.ok) {
            teachers = await response.json();
            console.log('✅ Loaded teachers from API:', teachers.length);
        } else {
            // Fallback to default data
            console.log('⚠️ API not available, using default teachers');
            teachers = defaultTeachers;
        }

        loading.style.display = 'none';

        if (teachers.length === 0) {
            // Use default if API returns empty
            teachers = defaultTeachers;
        }

        grid.style.display = 'grid';
        renderTeachers(teachers);

    } catch (err) {
        console.error('❌ Error loading teachers:', err);
        loading.style.display = 'none';
        
        // Fallback to default data on error
        grid.style.display = 'grid';
        renderTeachers(defaultTeachers);
    }
}

// ========================================================================
// RENDER TEACHERS
// ========================================================================
function renderTeachers(teachers) {
    const grid = document.getElementById('teachersList');
    grid.innerHTML = '';

    teachers.forEach(teacher => {
        const card = document.createElement('div');
        card.className = 'teacher-card';
        
        // Photo path
        const photoPath = teacher.photo || `assets/teachers/teacher-${teacher.id}.jpg`;
        const fullName = teacher.name || teacher.full_name || 'Teacher';
        const role = teacher.role || teacher.title || 'Tutor Bahasa Inggris';
        
        // ✅ Tampilkan nama lengkap
        const displayName = fullName;
        
        // ✅ Tentukan class berdasarkan panjang nama
        const nameLength = fullName.length;
        let nameClass = 'short-name';
        if (nameLength > 20) {
            nameClass = 'long-name';
        } else if (nameLength > 12) {
            nameClass = 'medium-name';
        }
        
        // Get initial for fallback
        const initial = fullName.charAt(0).toUpperCase();

        card.innerHTML = `
            <div class="teacher-photo-container">
                <img src="http://127.0.0.1:8000/${photoPath}" 
                     alt="${escapeHtml(fullName)}" 
                     class="teacher-photo"
                     onerror="this.outerHTML='<div class=\\'teacher-photo-fallback\\'>${initial}</div>'">
            </div>
            <div class="teacher-info">
                <button class="teacher-name-btn ${nameClass}">${escapeHtml(displayName)}</button>
                <div class="teacher-role">${escapeHtml(role)}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

// ========================================================================
// HELPER
// ========================================================================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
