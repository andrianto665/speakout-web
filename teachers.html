<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Teachers Page CSS -->
    <link rel="stylesheet" href="/css/teachers.css">
</head>
<body class="page-fade-in">

<!-- HEADER -->
<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html">Course</a></li>
                <li><a href="teachers.html" class="active">Teachers</a></li>
            </ul>
        </nav>
        <a href="login.html" class="btn-login">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span>Tim Pengajar</span>
        <div class="hero-eyebrow-line"></div>
    </div>
    <h1>Expert <em>Instructors</em></h1>
    <p>
        Belajar bersama mentor profesional SpeakOut untuk meningkatkan
        skill public speaking dan bahasa Inggris secara aktif dan modern.
    </p>
</section>

<!-- TEACHERS -->
<section class="teachers-section">
    <div class="container">

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading teachers...</p>
        </div>

        <div id="teachersList" class="teachers-grid" style="display:none;"></div>

        <div id="errorState" class="error-state" style="display:none;">
            Gagal memuat data teachers.
        </div>

    </div>
</section>

<!-- API Service -->
<script src="js/api.js"></script>

<!-- Teachers Logic -->
<script>
/**
 * 📁 teachers.html - Load Teachers dengan Foto
 * 🎯 Menampilkan daftar tutor dengan foto dari public/assets/teachers/
 */

const TEACHERS_API = 'http://127.0.0.1:8000/api/teachers';

// Default teachers data (fallback jika API belum tersedia)
const defaultTeachers = [
    {
        id: 1,
        name: 'Martina Wati',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/martinawati.png',
        expertise: ['Speaking', 'Grammar', 'TOEFL']
    },
    {
        id: 2,
        name: 'Hafiz Varintio RA',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/hafishvarintiora.png',
        expertise: ['Conversation', 'Writing', 'Business']
    },
    {
        id: 3,
        name: 'Visa Ranico',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/visaranico.png',
        expertise: ['Pronunciation', 'Listening', 'IELTS']
    },
    {
        id: 4,
        name: 'Krisna Islami',
        role: 'Tutor SpeakOut',
        photo: 'assets/teachers/krisnaislami.png',
        expertise: ['Vocabulary', 'Reading', 'TOEFL']
    }
];

// ========================================================================
// INIT
// ========================================================================
document.addEventListener('DOMContentLoaded', () => {
    loadTeachers();
});

// ========================================================================
// LOAD TEACHERS
// ========================================================================
async function loadTeachers() {
    const loading = document.getElementById('loadingState');
    const grid = document.getElementById('teachersList');
    const error = document.getElementById('errorState');

    try {
        const response = await fetch(TEACHERS_API, {
            headers: { 'Accept': 'application/json' }
        });

        let teachers = [];
        
        if (response.ok) {
            teachers = await response.json();
            console.log('✅ Loaded teachers from API:', teachers.length);
        } else {
            console.log('⚠️ API not available, using default teachers');
            teachers = defaultTeachers;
        }

        loading.style.display = 'none';

        if (teachers.length === 0) {
            teachers = defaultTeachers;
        }

        grid.style.display = 'grid';
        renderTeachers(teachers);

    } catch (err) {
        console.error('❌ Error loading teachers:', err);
        loading.style.display = 'none';
        
        grid.style.display = 'grid';
        renderTeachers(defaultTeachers);
    }
}

// ========================================================================
// RENDER TEACHERS
// ========================================================================
function renderTeachers(teachers) {
    const grid = document.getElementById('teachersList');
    grid.innerHTML = '';

    teachers.forEach(teacher => {
        const card = document.createElement('div');
        card.className = 'teacher-card';
        
        const photoPath = teacher.photo || `assets/teachers/teacher-${teacher.id}.jpg`;
        const fullName = teacher.name || teacher.full_name || 'Teacher';
        const role = teacher.role || teacher.title || 'Tutor Bahasa Inggris';
        
        const displayName = fullName;
        
        const nameLength = fullName.length;
        let nameClass = 'short-name';
        if (nameLength > 20) {
            nameClass = 'long-name';
        } else if (nameLength > 12) {
            nameClass = 'medium-name';
        }
        
        const initial = fullName.charAt(0).toUpperCase();

        card.innerHTML = `
            <div class="teacher-photo-container">
                <img src="http://127.0.0.1:8000/${photoPath}" 
                     alt="${escapeHtml(fullName)}" 
                     class="teacher-photo"
                     onerror="this.outerHTML='<div class=\\'teacher-photo-fallback\\'>${initial}</div>'">
            </div>
            <div class="teacher-info">
                <button class="teacher-name-btn ${nameClass}">${escapeHtml(displayName)}</button>
                <div class="teacher-role">${escapeHtml(role)}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

// ========================================================================
// HELPER
// ========================================================================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
