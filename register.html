<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SpeakOut</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f7f9fc;
            overflow-x:hidden;
            color:#1f2937;
        }

        a{
            text-decoration:none;
        }

        /* ================= HEADER ================= */

        .header{
            width:100%;
            background:white;
            padding:16px 0;
            position:sticky;
            top:0;
            z-index:999;
            box-shadow:0 2px 15px rgba(0,0,0,0.05);
        }

        .header-container{
            max-width:1200px;
            margin:auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-icon{
            width:45px;
            height:45px;
            border-radius:10px;
            background:#0A4D9B;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:22px;
            font-weight:700;
        }

        .logo-text h1{
            font-size:24px;
            color:#0A4D9B;
            line-height:1;
        }

        .logo-text p{
            font-size:12px;
            color:#666;
        }

        .nav-menu{
            display:flex;
            gap:30px;
            list-style:none;
        }

        .nav-menu a{
            color:#222;
            font-weight:500;
            transition:0.3s;
        }

        .nav-menu a:hover{
            color:#0A4D9B;
        }

        .btn-login{
            background:#0A4D9B;
            color:white;
            padding:13px 28px;
            border-radius:8px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#083a74;
        }

        /* ================= REGISTER SECTION ================= */

        .register-section{
            min-height:calc(100vh - 80px);
            background:linear-gradient(to right,#0A4D9B,#1E73BE);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:50px 20px;
        }

        .register-container{
            max-width:1100px;
            width:100%;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:50px;
            align-items:center;
        }

        .register-text{
            color:white;
        }

        .register-text h1{
            font-size:52px;
            line-height:1.2;
            margin-bottom:20px;
            font-weight:800;
        }

        .register-text p{
            font-size:18px;
            line-height:1.8;
            color:#f3f3f3;
        }

        /* ================= FORM CARD ================= */

        .register-card{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        .register-card h2{
            text-align:center;
            color:#0A4D9B;
            font-size:32px;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
            color:#333;
        }

        input{
            width:100%;
            padding:14px;
            border:2px solid #e5e7eb;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#0A4D9B;
        }

        .register-btn{
            width:100%;
            background:#E53935;
            color:white;
            padding:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .register-btn:hover{
            background:#c62828;
        }

        .link{
            text-align:center;
            margin-top:20px;
            font-size:14px;
        }

        .link a{
            color:#0A4D9B;
            font-weight:600;
        }

        /* ================= NOTIFICATION TOAST ================= */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.4s ease;
            max-width: 400px;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .notification.warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .notification-icon {
            font-size: 20px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .notification-message {
            font-size: 13px;
            opacity: 0.9;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:992px){

            .register-container{
                grid-template-columns:1fr;
            }

            .register-text{
                text-align:center;
            }

            .register-text h1{
                font-size:40px;
            }

            .nav-menu{
                display:none;
            }

            .notification {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }

        @media(max-width:600px){

            .register-card{
                padding:25px;
            }

            .register-text h1{
                font-size:30px;
            }

            .register-text p{
                font-size:16px;
            }

            .btn-login{
                padding:10px 18px;
            }

            .logo-text h1{
                font-size:20px;
            }

            .notification {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-container">

        <div class="logo">
            <div class="logo-icon">S</div>
            <div class="logo-text">
                <h1>SpeakOut</h1>
                <p>Ngomong Inggris Jadi Mudah</p>
            </div>
        </div>

        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html">Course</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>

        <a href="login.html" class="btn-login">Login</a>

    </div>
</header>

<section class="register-section">

    <div class="register-container">

        <div class="register-text">
            <h1>
                Bergabung dengan<br>
                SpeakOut Sekarang
            </h1>

            <p>
                Daftarkan akunmu dan mulai belajar bahasa Inggris
                dengan metode aktif, mentor ahli, dan akses belajar
                kapan saja di mana saja.
            </p>
        </div>

        <div class="register-card">

            <h2>Create Account</h2>

            <form id="registerForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Masukkan nama" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" minlength="6" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" required>
                </div>

                <button type="submit" class="register-btn">
                    Daftar Sekarang
                </button>

            </form>

            <div class="link">
                Sudah punya akun? <a href="login.html">Login di sini</a>
            </div>

        </div>

    </div>

</section>

<script src="js/api.js"></script>
<script>
// ============================================
// 📁 FILE: register.html - Script
// 🎯 Fungsi: Handle Register dengan Notifikasi
// ============================================

/**
 * Show notification toast
 * @param {string} message - Pesan notifikasi
 * @param {string} type - 'success', 'error', atau 'warning'
 */
function showNotification(message, type = 'success') {
    // Hapus notifikasi lama jika ada
    const existingNotification = document.querySelector('.notification');
    if (existingNotification) {
        existingNotification.remove();
    }

    // Buat elemen notifikasi
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    
    // Icon berdasarkan tipe
    const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️'
    };

    // Judul berdasarkan tipe
    const titles = {
        success: 'Berhasil!',
        error: 'Gagal!',
        warning: 'Perhatian!'
    };

    notification.innerHTML = `
        <span class="notification-icon">${icons[type]}</span>
        <div class="notification-content">
            <div class="notification-title">${titles[type]}</div>
            <div class="notification-message">${message}</div>
        </div>
    `;

    // Tambahkan ke body
    document.body.appendChild(notification);

    // Auto-remove setelah 4 detik
    setTimeout(() => {
        notification.style.animation = 'slideOutRight 0.4s ease forwards';
        setTimeout(() => {
            notification.remove();
        }, 400);
    }, 4000);
}

// ============================================
// 📝 REGISTER HANDLER
// ============================================
document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name')?.value.trim();
    const email = document.getElementById('email')?.value.trim();
    const password = document.getElementById('password')?.value;
    const confirmPassword = document.getElementById('confirmPassword')?.value;
    const btn = document.querySelector('#registerForm .register-btn');

    // ✅ Validasi frontend
    if (!name || !email || !password) {
        showNotification('Mohon lengkapi semua field!', 'error');
        return;
    }

    // ✅ Validasi confirm password
    if (password !== confirmPassword) {
        showNotification('Password tidak cocok!', 'error');
        return;
    }

    // ✅ Validasi panjang password
    if (password.length < 6) {
        showNotification('Password minimal 6 karakter!', 'error');
        return;
    }

    // ✅ Clear localStorage sebelum register
    localStorage.removeItem('speakout_token');
    localStorage.removeItem('speakout_user');

    // Tampilkan loading
    const originalBtnText = btn?.textContent || 'Daftar Sekarang';
    if (btn) {
        btn.textContent = 'Mendaftar...';
        btn.disabled = true;
    }

    try {
        const result = await api.register(name, email, password);
        console.log('🔹 Register Response:', result);

        if (result.success) {
            // ✅ Tampilkan notifikasi sukses
            showNotification('Registrasi berhasil! Silakan login.', 'success');
            
            // ✅ Tunggu 2 detik lalu redirect ke login
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            // Handle validation errors dari Laravel
            const errors = result.data?.errors;
            let errorMsg = 'Registrasi gagal.';
            
            if (errors) {
                const firstError = Object.values(errors)[0]?.[0];
                errorMsg = firstError || errorMsg;
            } else if (result.data?.message) {
                errorMsg = result.data.message;
            }
            
            showNotification(errorMsg, 'error');
        }
    } catch (error) {
        console.error('❌ Register Error:', error);
        showNotification('Koneksi error. Pastikan server Laravel berjalan.', 'error');
    } finally {
        if (btn) {
            btn.textContent = originalBtnText;
            btn.disabled = false;
        }
    }
});
</script>

</body>
</html>
