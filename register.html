<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SpeakOut</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            overflow-x: hidden;
            color: #1f1f3a;
        }

        a {
            text-decoration: none;
        }

        /* ================= HEADER ================= */
        .header {
            width: 100%;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10,15,35,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--blue-accent); }

        .nav-menu {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: var(--white);
        }

        .btn-login {
            background: var(--blue);
            color: white;
            padding: 11px 26px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--blue-light);
            transform: translateY(-1px);
        }

        /* ================= REGISTER SECTION ================= */
        .register-section {
            min-height: calc(100vh - 80px);
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
            overflow: hidden;
        }

        .register-section::before {
            content: "Register";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 200px;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
        }

        .register-container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .register-text {
            color: white;
        }

        .register-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 52px);
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .register-text h1 em {
            font-style: italic;
            color: var(--purple-accent);
        }

        .register-text p {
            font-size: clamp(14px, 1.5vw, 17px);
            line-height: 1.8;
            color: var(--gray);
            font-weight: 300;
        }

        /* ================= FORM CARD ================= */
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .register-card h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--blue);
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 900;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--blue);
        }

        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91, 45, 142, 0.3);
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .link a {
            color: var(--blue);
            font-weight: 600;
        }

        /* ================= NOTIFICATION TOAST ================= */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.4s ease;
            max-width: 400px;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .notification.warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .notification-icon {
            font-size: 20px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .notification-message {
            font-size: 13px;
            opacity: 0.9;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 992px) {
            .register-container {
                grid-template-columns: 1fr;
            }

            .register-text {
                text-align: center;
            }

            .register-text h1 {
                font-size: 40px;
            }

            .nav-menu {
                display: none;
            }

            .notification {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }

        @media (max-width: 600px) {
            .register-card {
                padding: 28px;
            }

            .register-text h1 {
                font-size: 30px;
            }

            .register-text p {
                font-size: 16px;
            }

            .btn-login {
                padding: 10px 18px;
                font-size: 13px;
            }

            .notification {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>

        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html">Course</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>

        <a href="login.html" class="btn-login">Login</a>
    </div>
</header>

<section class="register-section">

    <div class="register-container">

        <div class="register-text">
            <h1>
                Bergabung dengan<br>
                <em>SpeakOut</em> Sekarang
            </h1>

            <p>
                Daftarkan akunmu dan mulai belajar bahasa Inggris
                dengan metode aktif, mentor ahli, dan akses belajar
                kapan saja di mana saja.
            </p>
        </div>

        <div class="register-card">

            <h2>Create Account</h2>

            <form id="registerForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Masukkan nama" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" minlength="6" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" required>
                </div>

                <button type="submit" class="register-btn">
                    Daftar Sekarang
                </button>

            </form>

            <div class="link">
                Sudah punya akun? <a href="login.html">Login di sini</a>
            </div>

        </div>

    </div>

</section>

<script src="js/api.js"></script>
<script>
// ============================================
// 📁 FILE: register.html - Script
// 🎯 Fungsi: Handle Register dengan Notifikasi
// ============================================

/**
 * Show notification toast
 * @param {string} message - Pesan notifikasi
 * @param {string} type - 'success', 'error', atau 'warning'
 */
function showNotification(message, type = 'success') {
    // Hapus notifikasi lama jika ada
    const existingNotification = document.querySelector('.notification');
    if (existingNotification) {
        existingNotification.remove();
    }

    // Buat elemen notifikasi
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    
    // Icon berdasarkan tipe
    const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️'
    };

    // Judul berdasarkan tipe
    const titles = {
        success: 'Berhasil!',
        error: 'Gagal!',
        warning: 'Perhatian!'
    };

    notification.innerHTML = `
        <span class="notification-icon">${icons[type]}</span>
        <div class="notification-content">
            <div class="notification-title">${titles[type]}</div>
            <div class="notification-message">${message}</div>
        </div>
    `;

    // Tambahkan ke body
    document.body.appendChild(notification);

    // Auto-remove setelah 4 detik
    setTimeout(() => {
        notification.style.animation = 'slideOutRight 0.4s ease forwards';
        setTimeout(() => {
            notification.remove();
        }, 400);
    }, 4000);
}

// ============================================
// 📝 REGISTER HANDLER
// ============================================
document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name')?.value.trim();
    const email = document.getElementById('email')?.value.trim();
    const password = document.getElementById('password')?.value;
    const confirmPassword = document.getElementById('confirmPassword')?.value;
    const btn = document.querySelector('#registerForm .register-btn');

    // ✅ Validasi frontend
    if (!name || !email || !password) {
        showNotification('Mohon lengkapi semua field!', 'error');
        return;
    }

    // ✅ Validasi confirm password
    if (password !== confirmPassword) {
        showNotification('Password tidak cocok!', 'error');
        return;
    }

    // ✅ Validasi panjang password
    if (password.length < 6) {
        showNotification('Password minimal 6 karakter!', 'error');
        return;
    }

    // ✅ Clear localStorage sebelum register
    localStorage.removeItem('speakout_token');
    localStorage.removeItem('speakout_user');

    // Tampilkan loading
    const originalBtnText = btn?.textContent || 'Daftar Sekarang';
    if (btn) {
        btn.textContent = 'Mendaftar...';
        btn.disabled = true;
    }

    try {
        const result = await api.register(name, email, password);
        console.log('🔹 Register Response:', result);

        if (result.success) {
            // ✅ Tampilkan notifikasi sukses
            showNotification('Registrasi berhasil! Silakan login.', 'success');
            
            // ✅ Tunggu 2 detik lalu redirect ke login
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            // Handle validation errors dari Laravel
            const errors = result.data?.errors;
            let errorMsg = 'Registrasi gagal.';
            
            if (errors) {
                const firstError = Object.values(errors)[0]?.[0];
                errorMsg = firstError || errorMsg;
            } else if (result.data?.message) {
                errorMsg = result.data.message;
            }
            
            showNotification(errorMsg, 'error');
        }
    } catch (error) {
        console.error('❌ Register Error:', error);
        showNotification('Koneksi error. Pastikan server Laravel berjalan.', 'error');
    } finally {
        if (btn) {
            btn.textContent = originalBtnText;
            btn.disabled = false;
        }
    }
});
</script>

</body>
</html>
