<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakOut - Tidak Ada Koneksi</title>
<link rel="icon" type="image/png" href="images/icon-192.png">
<meta name="theme-color" content="#8B2C98">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple: #8B2C98;
    --orange: #FF5500;
    --dark: #0d0d18;
    --gray: #a0a0b8;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 380px;
  }
  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 32px;
  }
  .logo .speak { color: #fff; }
  .logo .out { color: var(--orange); }
  .icon-wrap {
    width: 88px;
    height: 88px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: rgba(139, 44, 152, 0.15);
    border: 1.5px solid rgba(139, 44, 152, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-wrap svg { width: 38px; height: 38px; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  p {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .btn-retry {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--purple);
    color: #fff;
    border: none;
    padding: 13px 30px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.25s;
  }
  .btn-retry:hover { background: var(--orange); }
  .btn-retry:active { transform: scale(0.98); }
  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="speak">Speak</span><span class="out">Out</span></div>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a0a0b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 9a16 16 0 0 1 22 0"/>
        <path d="M5 12.5a11 11 0 0 1 14 0"/>
        <path d="M8.5 16a6 6 0 0 1 7 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="#FF5500"/>
      </svg>
    </div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>
      Sepertinya kamu sedang offline. Periksa koneksi WiFi atau data
      seluler kamu, lalu coba lagi.
    </p>
    <button class="btn-retry" onclick="window.location.reload()">
      ↻ Coba Lagi
    </button>
    <div class="hint">Halaman yang sudah pernah dibuka mungkin masih bisa diakses</div>
  </div>
</body>
</html>
