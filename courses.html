<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - SpeakOut</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Courses Page CSS -->
    <link rel="stylesheet" href="/css/courses.css">
</head>
<body class="page-fade-in">

<!-- HEADER -->
<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html" class="active">Course</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>
        <a id="authBtn" href="login.html" class="btn-login">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span>Program Unggulan</span>
        <div class="hero-eyebrow-line"></div>
    </div>
    <h1>Premium Courses <em>SpeakOut</em></h1>
    <p>
        Belajar bahasa Inggris dan public speaking bersama mentor profesional
        dengan metode aktif, praktis, dan modern khas SpeakOut.
    </p>
</section>

<!-- FILTER & SORTING SECTION -->
<div class="filter-sorting-section">
    <div class="filter-sorting-wrapper">
        
        <!-- Filter Group -->
        <div class="filter-group">
            <div class="filter-item">
                <label for="filterKategori">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M1.5 1h13a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1zm0 5h13a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1zm0 5h13a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1z"/>
                    </svg>
                    Kategori
                </label>
                <select id="filterKategori">
                    <option value="">Semua Kategori</option>
                    <option value="speaking">Speaking</option>
                    <option value="grammar">Grammar</option>
                    <option value="vocabulary">Vocabulary</option>
                    <option value="business">Business English</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="filterLevel">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.906.906 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
                    </svg>
                    Level
                </label>
                <select id="filterLevel">
                    <option value="">Semua Level</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="filterHarga">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M4 10.781c.148 1.667 1.513 2.85 3.591 3.003V15h1.043v-1.216c2.27-.179 3.678-1.438 3.678-3.3 0-1.615-1.098-2.517-2.714-2.874l-.459-.101c-.73-.161-1.112-.385-1.112-.819 0-.49.434-.864 1.168-.864.738 0 1.285.374 1.424.864h1.636c-.179-1.294-1.238-2.166-2.918-2.343V2h-1.043v1.216c-2.078.15-3.443 1.333-3.591 3h1.043c.148-.832.738-1.355 1.8-1.462V6.5c-1.216.109-1.8.632-1.943 1.462h-1.043zm3.25 4.469c1.216-.109 1.8-.632 1.943-1.462h-1.043c-.148.832-.738 1.355-1.8 1.462V11.5c1.216-.109 1.8-.632 1.943-1.462h-1.043c-.148.832-.738 1.355-1.8 1.462v1.216h1.043v-1.216z"/>
                    </svg>
                    Harga
                </label>
                <select id="filterHarga">
                    <option value="">Semua Harga</option>
                    <option value="free">Gratis</option>
                    <option value="paid">Berbayar</option>
                </select>
            </div>
        </div>

        <!-- Sorting -->
        <div class="sorting-group">
            <label for="sortBy">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M3.5 2.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L3.5 11.293V2.5zm3.5 1a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zM7.5 6a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zm0 3a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zm0 3a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5z"/>
                </svg>
                Urutkan
            </label>
            <select id="sortBy">
                <option value="newest">Terbaru</option>
                <option value="popular">Terpopuler</option>
                <option value="price-low">Harga: Rendah ke Tinggi</option>
                <option value="price-high">Harga: Tinggi ke Rendah</option>
                <option value="name-asc">Nama: A-Z</option>
            </select>
        </div>

    </div>
</div>

<!-- COURSES -->
<section class="courses-section">
    <div class="container">

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading courses...</p>
        </div>

        <div id="coursesList" class="courses-wrapper"></div>

        <div id="errorState" class="error-state" style="display:none;">
            Gagal memuat courses. Coba refresh halaman.
        </div>

    </div>
</section>

<!-- API Service -->
<script src="js/api.js"></script>

<!-- Courses Logic -->
<script>
// ✅ FALLBACK IMAGE MAP
const courseImages = {
    "Public Speaking 101": "publicspeaking.png",
    "Debate & Argumentation": "debate.png",
    "English For Family": "englishforfamily.png",
    "English For Society": "englishforsociety.png",
    "English For Professional": "englishforprofessional.png"
};
const BASE_IMAGE_URL = 'http://127.0.0.1:8000/assets/courses/';

// DOM Elements
const authBtn = document.getElementById('authBtn');
const loadingState = document.getElementById('loadingState');
const coursesList = document.getElementById('coursesList');
const errorState = document.getElementById('errorState');

// Filter & Sorting Elements
const filterKategori = document.getElementById('filterKategori');
const filterLevel = document.getElementById('filterLevel');
const filterHarga = document.getElementById('filterHarga');
const sortBy = document.getElementById('sortBy');

// Store all courses
let allCourses = [];

// ========================================================================
// INIT
// ========================================================================
document.addEventListener('DOMContentLoaded', () => {
    updateAuthButton();
    
    if (authBtn) {
        authBtn.addEventListener('click', handleAuthClick);
    }
    
    filterKategori.addEventListener('change', applyFilters);
    filterLevel.addEventListener('change', applyFilters);
    filterHarga.addEventListener('change', applyFilters);
    sortBy.addEventListener('change', applyFilters);
    
    loadCourses();
});

function updateAuthButton() {
    if (!authBtn) return;
    
    if (api.isLoggedIn()) {
        const user = api.getUser();
        const userName = user?.name?.split(' ')[0] || 'User';
        
        authBtn.textContent = `Dashboard ${userName}`;
        authBtn.href = 'dashboard.html';
        authBtn.className = 'btn-login logged-in';
        authBtn.title = 'Go to Dashboard';
    } else {
        authBtn.textContent = 'Login';
        authBtn.href = 'login.html';
        authBtn.className = 'btn-login';
        authBtn.title = 'Click to login';
    }
}

function handleAuthClick(e) {
    if (api.isLoggedIn()) {
        e.preventDefault();
        if (confirm('Apakah Anda ingin logout?')) {
            api.logout();
            window.location.reload();
        }
    }
}

/**
 * Load courses from API
 */
async function loadCourses() {
    try {
        loadingState.style.display = 'block';
        coursesList.style.display = 'none';
        errorState.style.display = 'none';
        
        const response = await fetch('http://127.0.0.1:8000/api/courses', {
            headers: { 'Accept': 'application/json' }
        });
        
        if (!response.ok) throw new Error('Failed to fetch courses');
        
        allCourses = await response.json();
        
        loadingState.style.display = 'none';
        
        if (allCourses.length === 0) {
            coursesList.innerHTML = '<p style="text-align:center; color:var(--gray); padding:40px;">No courses available yet.</p>';
            coursesList.style.display = 'block';
            return;
        }
        
        applyFilters();
        
    } catch (error) {
        console.error('Error loading courses:', error);
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
    }
}

/**
 * Apply filters and sorting
 */
function applyFilters() {
    let filteredCourses = [...allCourses];
    
    const category = filterKategori.value;
    if (category) {
        filteredCourses = filteredCourses.filter(course => 
            course.category?.toLowerCase() === category.toLowerCase()
        );
    }
    
    const level = filterLevel.value;
    if (level) {
        filteredCourses = filteredCourses.filter(course => 
            course.level?.toLowerCase() === level.toLowerCase()
        );
    }
    
    const price = filterHarga.value;
    if (price === 'free') {
        filteredCourses = filteredCourses.filter(course => 
            !course.price || course.price === 0 || course.price === 'free'
        );
    } else if (price === 'paid') {
        filteredCourses = filteredCourses.filter(course => 
            course.price && course.price > 0 && course.price !== 'free'
        );
    }
    
    const sort = sortBy.value;
    switch (sort) {
        case 'newest':
            filteredCourses.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            break;
        case 'popular':
            filteredCourses.sort((a, b) => (b.total_lessons || 0) - (a.total_lessons || 0));
            break;
        case 'price-low':
            filteredCourses.sort((a, b) => (a.price || 0) - (b.price || 0));
            break;
        case 'price-high':
            filteredCourses.sort((a, b) => (b.price || 0) - (a.price || 0));
            break;
        case 'name-asc':
            filteredCourses.sort((a, b) => a.title.localeCompare(b.title));
            break;
    }
    
    if (filteredCourses.length === 0) {
        coursesList.innerHTML = `
            <div class="no-results">
                <div class="no-results-icon">🔍</div>
                <h3>Tidak ada course yang cocok</h3>
                <p>Coba ubah filter atau sorting untuk melihat course lain</p>
            </div>
        `;
    } else {
        renderCourses(filteredCourses);
    }
    
    coursesList.style.display = 'flex';
}

/**
 * ✅ Get image URL
 */
function getImageUrl(course) {
    if (course.thumbnail && course.thumbnail.trim() !== '') {
        return `http://127.0.0.1:8000/${course.thumbnail}`;
    }
    
    const imageName = courseImages[course.title] || 'default.png';
    return BASE_IMAGE_URL + imageName;
}

/**
 * ✅ Format harga - TAMPILKAN HARGA PENUH
 */
function formatPrice(price) {
    if (!price || price === 0 || price === 'free') {
        return {
            html: 'Gratis',
            isFree: true
        };
    }
    
    return {
        html: `Rp ${price.toLocaleString('id-ID')}`,
        isFree: false
    };
}

/**
 * Render course cards
 */
function renderCourses(courses) {
    coursesList.innerHTML = '';
    
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'course-card';
        
        const imageUrl = getImageUrl(course);
        const hasThumbnail = course.thumbnail && course.thumbnail.trim() !== '';
        
        const isEnrolled = api.isLoggedIn() && course.is_enrolled;
        const btnText = isEnrolled ? '✓ Enrolled' : 'Enroll Now';
        const btnClass = isEnrolled ? 'enrolled' : '';
        const btnDisabled = isEnrolled ? 'disabled' : '';
        
        const priceData = formatPrice(course.price);
        const priceClass = priceData.isFree ? 'free-price' : '';
        
        const imageSection = hasThumbnail ? 
            `<img src="${imageUrl}" alt="${escapeHtml(course.title)}" onerror="this.style.display='none'; this.parentElement.classList.add('no-image');">` :
            `<div class="course-placeholder">${escapeHtml(course.title).substring(0, 30)}${escapeHtml(course.title).length > 30 ? '...' : ''}</div>`;
        
        card.innerHTML = `
            <div class="course-image ${!hasThumbnail ? 'no-image' : ''}">
                ${imageSection}
                <span class="course-badge">Premium</span>
            </div>
            <div class="course-content">
                <div>
                    <h3 class="course-title">${escapeHtml(course.title)}</h3>
                    <p class="course-author">By <span>${escapeHtml(course.instructor)}</span></p>
                    
                    <div class="course-meta">
                        <span class="meta-item">📚 ${course.total_lessons || 0} Lessons</span>
                        <span class="meta-item">⏱️ ${course.duration || 'Self-paced'}</span>
                        <span class="meta-item">🎓 ${course.level || 'Beginner-Advanced'}</span>
                    </div>
                    
                    <p class="course-desc">${escapeHtml(course.description?.substring(0, 200) || 'Expand your skills with this comprehensive course.')}${course.description?.length > 200 ? '...' : ''}</p>
                </div>
                
                <div class="course-footer">
                    <span class="course-price ${priceClass}">
                        ${priceData.html}
                    </span>
                    <button class="btn-enroll ${btnClass}" 
                            ${btnDisabled}
                            onclick="handleEnroll(${course.id}, this, event)">
                        ${btnText}
                    </button>
                </div>
            </div>
        `;
        
        card.addEventListener('click', function(e) {
            if (e.target.classList.contains('btn-enroll')) return;
            
            const encodedTitle = encodeURIComponent(course.title);
            window.location.href = `course-details.html?course_id=${course.id}&title=${encodedTitle}`;
        });
        
        coursesList.appendChild(card);
    });
}

/**
 * Handle enroll button click
 */
function handleEnroll(courseId, btn, event) {
    event.stopPropagation();
    
    if (!api.isLoggedIn()) {
        alert('Please login first to enroll in courses!');
        window.location.href = 'login.html';
        return;
    }
    
    const originalText = btn.textContent;
    btn.textContent = 'Enrolling...';
    btn.disabled = true;
    
    fetch(`http://127.0.0.1:8000/api/user/enroll/${courseId}`, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${api.getToken()}`,
            'Accept': 'application/json'
        }
    })
    .then(response => response.json())
    .then(data => {
        alert(`✅ Successfully enrolled in "${data.course.title}"!\n\nRedirecting to your dashboard...`);
        window.location.href = 'dashboard.html';
    })
    .catch(error => {
        console.error('Enroll error:', error);
        alert('❌ ' + (error.message || 'Enrollment failed'));
        btn.textContent = originalText;
        btn.disabled = false;
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
