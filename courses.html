<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Courses - SpeakOut E-Course</title>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f7f7f7;
            overflow-x:hidden;
            color:#222;
        }

        a{
            text-decoration:none;
        }

        /* ================= HEADER ================= */

        .header{
            width:100%;
            background:white;
            padding:18px 0;
            position:sticky;
            top:0;
            z-index:999;
            box-shadow:0 2px 15px rgba(0,0,0,0.04);
        }

        .header-container{
            max-width:1200px;
            margin:auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-icon{
            width:45px;
            height:45px;
            border-radius:12px;
            background:linear-gradient(135deg,#ff8a00,#ff0058);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:22px;
            font-weight:700;
        }

        .logo-text h1{
            font-size:24px;
            color:#252b72;
            line-height:1;
        }

        .logo-text p{
            font-size:12px;
            color:#666;
        }

        .nav-menu{
            display:flex;
            gap:35px;
            list-style:none;
        }

        .nav-menu a{
            color:#222;
            font-weight:500;
            transition:0.3s;
        }

        .nav-menu a:hover,
        .nav-menu .active{
            color:#5b4bff;
        }

        .btn-login{
            background:#1e73be;
            color:white;
            padding:14px 34px;
            border-radius:4px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#125e9f;
        }

        /* ================= COURSES ================= */

        .courses-section{
            width:100%;
            padding:90px 20px;
            position:relative;
            overflow:hidden;
        }

        .courses-section::before{
            content:"Courses";
            position:absolute;
            left:-20px;
            top:20px;
            font-size:220px;
            font-weight:800;
            color:rgba(0,0,0,0.03);
            z-index:0;
        }

        .container{
            max-width:1200px;
            margin:auto;
            position:relative;
            z-index:2;
        }

        .page-header{
            text-align:center;
            margin-bottom:70px;
        }

        .page-header h1{
            font-size:72px;
            color:#252b72;
            font-weight:800;
            margin-bottom:18px;
            line-height:1.1;
        }

        .page-header p{
            font-size:22px;
            color:#555;
            max-width:750px;
            margin:auto;
            line-height:1.7;
        }

        /* ================= COURSE CARD ================= */

        .courses-wrapper{
            display:flex;
            flex-direction:column;
            gap:35px;
        }

        .course-card{
            background:white;
            border-radius:32px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
            display:grid;
            grid-template-columns:380px 1fr;
            transition:0.3s;
        }

        .course-card:hover{
            transform:translateY(-8px);
        }

        /* LEFT */

        .course-image{
            position:relative;
            overflow:hidden;
            min-height:100%;
        }

        .course-image img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .course-badge{
            position:absolute;
            top:20px;
            left:20px;
            background:linear-gradient(135deg,#ff00b8,#7b00ff);
            color:white;
            padding:10px 18px;
            border-radius:50px;
            font-size:14px;
            font-weight:600;
            box-shadow:0 10px 25px rgba(191,0,255,0.25);
        }

        /* RIGHT */

        .course-content{
            padding:40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .course-title{
            font-size:48px;
            color:#252b72;
            font-weight:700;
            line-height:1.2;
            margin-bottom:15px;
        }

        .course-author{
            font-size:20px;
            margin-bottom:28px;
            color:#666;
        }

        .course-author span{
            color:#4f46e5;
            font-weight:600;
        }

        .course-meta{
            display:flex;
            flex-wrap:wrap;
            gap:22px;
            margin-bottom:28px;
        }

        .meta-item{
            display:flex;
            align-items:center;
            gap:10px;
            color:#555;
            font-size:16px;
            background:#f5f7ff;
            padding:12px 18px;
            border-radius:14px;
        }

        .course-desc{
            font-size:18px;
            color:#555;
            line-height:1.8;
            margin-bottom:35px;
        }

        .course-footer{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
        }

        .course-price{
            font-size:42px;
            font-weight:700;
            color:#17b417;
        }

        .course-btn{
            display:inline-block;
            padding:18px 38px;
            border-radius:18px;
            background:linear-gradient(135deg,#e000ff,#7b00ff);
            color:white;
            font-size:18px;
            font-weight:600;
            transition:0.3s;
            box-shadow:0 10px 25px rgba(191,0,255,0.2);
        }

        .course-btn:hover{
            transform:translateY(-3px);
        }

        /* ================= LOADING ================= */

        .loading{
            text-align:center;
            padding:80px 20px;
        }

        .spinner{
            width:70px;
            height:70px;
            border:6px solid #ececec;
            border-top-color:#5b4bff;
            border-radius:50%;
            margin:auto auto 20px;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        /* ================= ERROR ================= */

        .error-state{
            text-align:center;
            padding:80px 20px;
            color:#ff3b3b;
            font-size:22px;
            font-weight:600;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:1100px){

            .course-card{
                grid-template-columns:1fr;
            }

            .course-image{
                height:320px;
            }

            .course-title{
                font-size:38px;
            }
        }

        @media(max-width:992px){

            .nav-menu{
                display:none;
            }

            .page-header h1{
                font-size:52px;
            }

            .page-header p{
                font-size:18px;
            }
        }

        @media(max-width:768px){

            .course-content{
                padding:28px;
            }

            .course-title{
                font-size:32px;
            }

            .course-author{
                font-size:17px;
            }

            .course-desc{
                font-size:16px;
            }

            .course-footer{
                flex-direction:column;
                align-items:flex-start;
            }

            .course-btn{
                width:100%;
                text-align:center;
            }

            .course-price{
                font-size:34px;
            }
        }

        @media(max-width:600px){

            .page-header h1{
                font-size:42px;
            }

            .course-image{
                height:240px;
            }

            .course-meta{
                gap:12px;
            }

            .meta-item{
                width:100%;
                font-size:14px;
            }

            .btn-login{
                padding:12px 22px;
            }

            .course-title{
                font-size:28px;
            }
        }

    </style>
</head>
<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="header-container">

            <a href="index.html" class="logo">

                <div class="logo-icon">S</div>

                <div class="logo-text">
                    <h1>SpeakOut</h1>
                    <p>Ngomong Inggris Jadi Mudah</p>
                </div>

            </a>

            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="courses.html" class="active">Course</a></li>
                    <li><a href="teachers.html">Teachers</a></li>
                    <li><a href="#">Informasi Akademik</a></li>
                </ul>
            </nav>

            <a href="login.html" class="btn-login">
                Login
            </a>

        </div>

    </header>

    <!-- ================= COURSES ================= -->

    <section class="courses-section">

        <div class="container">

            <div class="page-header">

                <h1>
                    Premium <br>
                    Courses
                </h1>

                <p>
                    Belajar bahasa Inggris dan public speaking
                    dengan sistem modern, mentor profesional,
                    dan pembelajaran aktif khas SpeakOut.
                </p>

            </div>

            <!-- LOADING -->
            <div id="loadingState" class="loading">

                <div class="spinner"></div>

                <p>Loading courses...</p>

            </div>

            <!-- COURSE LIST -->
            <div id="coursesList" class="courses-wrapper"></div>

            <!-- ERROR -->
            <div id="errorState" class="error-state" style="display:none;">
                Failed to load courses
            </div>

        </div>

    </section>

    <!-- JS -->
    <script src="js/courses.js"></script>

</body>
</html>
