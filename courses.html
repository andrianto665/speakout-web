<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - SpeakOut</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark: #0f0f1a;
            --dark2: #14142a;
            --purple: #5b2d8e;
            --purple-light: #7b4db5;
            --purple-accent: #a67cda;
            --blue: #0A4D9B;
            --blue-light: #1565c0;
            --blue-accent: #4a90d9;
            --white: #ffffff;
            --gray: #a0a0b8;
            --surface: #1a1a35;
            --surface2: #f4f4fc;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            color: #1f1f3a;
            overflow-x: hidden;
        }

        a { text-decoration: none; }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10,15,35,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--blue-accent); }

        .nav-menu {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu .active { color: var(--white); }

        .btn-login {
            background: var(--blue);
            color: white;
            padding: 11px 26px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--blue-light);
            transform: translateY(-1px);
        }

        /* ===== HERO ===== */
        .hero {
            width: 100%;
            padding: 80px 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0a35 50%, #0a1a40 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "Courses";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 200px;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .hero-eyebrow-line {
            width: 32px;
            height: 2px;
            background: var(--blue-accent);
        }

        .hero-eyebrow span {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--blue-accent);
            font-weight: 500;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--purple-accent);
        }

        .hero p {
            font-size: clamp(14px, 1.5vw, 18px);
            line-height: 1.8;
            color: var(--gray);
            max-width: 600px;
            margin: auto;
            font-weight: 300;
        }

        /* ===== COURSES SECTION ===== */
        .courses-section {
            width: 100%;
            padding: 70px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(91,45,142,0.15);
            border-top-color: var(--purple);
            border-radius: 50%;
            margin: auto auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== COURSE CARDS ===== */
        .courses-wrapper {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(91,45,142,0.08);
            display: grid;
            grid-template-columns: 300px 1fr;
            transition: 0.3s;
            border: 1px solid rgba(91,45,142,0.08);
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(91,45,142,0.15);
        }

        .course-image {
            position: relative;
            overflow: hidden;
        }

        .course-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s;
        }

        .course-card:hover .course-image img {
            transform: scale(1.05);
        }

        .course-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .course-content {
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .course-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(22px, 2.5vw, 30px);
            color: var(--dark);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .course-author {
            font-size: 15px;
            color: #666;
            margin-bottom: 20px;
        }

        .course-author span {
            color: var(--purple);
            font-weight: 600;
        }

        .course-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .meta-item {
            background: rgba(91,45,142,0.07);
            color: var(--purple);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .course-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-price {
            font-size: 26px;
            font-weight: 700;
            color: var(--purple);
        }

        /* ===== ERROR ===== */
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: #e53935;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 992px) {
            .nav-menu { display: none; }
            .course-card { grid-template-columns: 1fr; }
            .course-image { height: 240px; }
        }

        @media(max-width: 768px) {
            .header-container { padding: 0 24px; }
            .hero { padding: 60px 20px; }
            .hero::before { font-size: 100px; }
        }

        @media(max-width: 480px) {
            .course-content { padding: 22px; }
            .course-footer { flex-direction: column; align-items: flex-start; gap: 10px; }
            .btn-login { padding: 10px 20px; font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">SPEAK<span>OUT</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="courses.html" class="active">Course</a></li>
                <li><a href="teachers.html">Teachers</a></li>
            </ul>
        </nav>
        <a href="login.html" class="btn-login">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span>Program Unggulan</span>
        <div class="hero-eyebrow-line"></div>
    </div>
    <h1>Premium Courses <em>SpeakOut</em></h1>
    <p>
        Belajar bahasa Inggris dan public speaking bersama mentor profesional
        dengan metode aktif, praktis, dan modern khas SpeakOut.
    </p>
</section>

<!-- COURSES -->
<section class="courses-section">
    <div class="container">

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading courses...</p>
        </div>

        <div id="coursesList" class="courses-wrapper"></div>

        <div id="errorState" class="error-state" style="display:none;">
            Gagal memuat courses. Coba refresh halaman.
        </div>

    </div>
</section>

<script src="js/courses.js"></script>

</body>
</html>
